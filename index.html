<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Whiteboard | Pro Workspace</title>

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3c72">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(-45deg,#1e3c72,#2a5298,#0f2027,#203a43);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
overflow:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.loader-card{
width:380px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
text-align:center;
color:white;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
animation:fadeIn 1s ease;
}

.logo{
font-size:60px;
margin-bottom:20px;
animation:pulse 2.5s infinite ease-in-out;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

.title{
font-size:28px;
font-weight:600;
margin-bottom:6px;
letter-spacing:1px;
}

.subtitle{
font-size:14px;
opacity:0.8;
margin-bottom:35px;
}

.status{
font-size:13px;
margin-bottom:15px;
opacity:0.9;
letter-spacing:0.5px;
}

.progress-container{
width:100%;
height:6px;
background:rgba(255,255,255,0.2);
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:white;
border-radius:10px;
box-shadow:0 0 10px white;
transition:width 0.3s ease;
}

.percent{
margin-top:12px;
font-size:12px;
opacity:0.85;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.fade-out{
animation:fadeOut 1s forwards;
}

@keyframes fadeOut{
to{opacity:0;transform:scale(1.05);}
}

.footer{
margin-top:30px;
font-size:11px;
opacity:0.6;
}

/* Install Button */
#installContainer{
margin-top:20px;
display:none;
}

#installBtn{
padding:8px 18px;
border:none;
border-radius:8px;
background:white;
color:#1e3c72;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

#installBtn:hover{
transform:scale(1.05);
}
</style>
</head>
<body>

<div class="loader-card" id="loader">

<div class="logo">
<i class="fa-solid fa-chalkboard"></i>
</div>

<div class="title">Pro Whiteboard</div>
<div class="subtitle">Pro</div>

<div class="status" id="status">Initializing System...</div>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<div class="percent" id="percent">0%</div>

<div id="installContainer">
<button id="installBtn">Install App</button>
</div>

<div class="footer">
Secure • Fast • Intelligent
</div>

</div>

<script>

/* ================= LOADER SYSTEM ================= */

const steps = [
"Initializing System...",
"Securing Authentication...",
"Loading User Workspace...",
"Connecting Dashboard...",
"Finalizing Launch..."
];

let progress = 0;
let stepIndex = 0;

const progressBar = document.getElementById("progress");
const percentText = document.getElementById("percent");
const statusText = document.getElementById("status");
const loader = document.getElementById("loader");

function updateLoader(){

progress += Math.floor(Math.random()*7) + 4;

if(progress >= 100){
progress = 100;
progressBar.style.width = "100%";
percentText.textContent = "100%";
statusText.textContent = "Launching Dashboard...";

setTimeout(()=>{
loader.classList.add("fade-out");
setTimeout(()=>{
window.location.href = "dashboard.html";
},1000);
},700);

return;
}

if(progress > (stepIndex+1)*20 && stepIndex < steps.length-1){
stepIndex++;
statusText.textContent = steps[stepIndex];
}

progressBar.style.width = progress + "%";
percentText.textContent = progress + "%";

setTimeout(updateLoader,150);
}

setTimeout(updateLoader,800);

/* ================= PWA SYSTEM ================= */

let deferredPrompt;
const installBtn = document.getElementById("installBtn");
const installContainer = document.getElementById("installContainer");

/* Service Worker */
if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('service-worker.js')
.then(reg => {

reg.onupdatefound = () => {
const newWorker = reg.installing;
newWorker.onstatechange = () => {
if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
alert("New version available. Refreshing...");
window.location.reload();
}
};
};

});
});
}

/* Install Prompt */
window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
installContainer.style.display = "block";
});

installBtn.addEventListener("click", async () => {
if (!deferredPrompt) return;

deferredPrompt.prompt();
const choice = await deferredPrompt.userChoice;

if (choice.outcome === 'accepted') {
installContainer.style.display = "none";
}

deferredPrompt = null;
});

/* Offline / Online Detection */
window.addEventListener("offline", () => {
statusText.textContent = "Offline Mode Enabled";
});

window.addEventListener("online", () => {
statusText.textContent = "Connected Successfully";
});

</script>
<script>
const APP_VERSION = "1.0.0";
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxjBhiQSg2a3H_cWu1R-H88IPtWTMG439b18wJHZiscKpNZgA8gHaw7E99ow5GjpwFaGA/exec";

function getDeviceId() {
  let id = localStorage.getItem("device_id");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }
  return id;
}

function sendEvent(eventType) {
  fetch(WEBHOOK_URL, {
    method: "POST",
    body: JSON.stringify({
      eventType: eventType,
      deviceId: getDeviceId(),
      userAgent: navigator.userAgent,
      platform: navigator.platform,
      referrer: document.referrer,
      appVersion: APP_VERSION,
      mode: window.matchMedia('(display-mode: standalone)').matches 
            ? "standalone" 
            : "browser"
    })
  });
}

// Track first visit
sendEvent("visit");

// Track standalone open
if (window.matchMedia('(display-mode: standalone)').matches) {
  sendEvent("standalone_open");
}
</script>

</body>
</html>
