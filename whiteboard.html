<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProBoard — Infinite Canvas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.11.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/patternLock/0.5.0/patternLock.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/patternLock/0.5.0/patternLock.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* =============================================
   DESIGN TOKENS
   ============================================= */
:root {
  --bg-app:        #0f1117;
  --bg-chrome:     #161a23;
  --bg-panel:      #1c2030;
  --bg-hover:      #252b3b;
  --bg-active:     #2e3650;
  --border:        rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.15);
  --accent:        #4f7dff;
  --accent-glow:   rgba(79,125,255,0.35);
  --accent-2:      #a78bfa;
  --success:       #34d399;
  --danger:        #f87171;
  --warn:          #fbbf24;
  --text-primary:  #e8ecf4;
  --text-secondary:#8892a8;
  --text-dim:      #4d5568;
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.4);
  --shadow-md:     0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg:     0 12px 40px rgba(0,0,0,0.6);
  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     16px;
  --dur:           0.18s;
  --ease:          cubic-bezier(.4,0,.2,1);
  --tab-h:         40px;
  --ribbon-h:      54px;
  --total-top:     calc(var(--tab-h) + var(--ribbon-h));
  --sidebar-w:     130px;
  --font:          'DM Sans', sans-serif;
  --mono:          'DM Mono', monospace;
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg-app);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

/* =============================================
   APP HEADER / WORDMARK
   ============================================= */
#appHeader {
  display: flex;
  align-items: center;
  gap: 0;
  height: var(--tab-h);
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 200;
}

#wordmark {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 18px;
  border-right: 1px solid var(--border);
  height: 100%;
  min-width: 130px;
}

#wordmark .logo-icon {
  width: 22px;
  height: 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
  flex-shrink: 0;
}

#wordmark span {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text-primary);
}

#wordmark small {
  font-size: 9px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 1px;
}

/* =============================================
   RIBBON TABS
   ============================================= */
#ribbonTabs {
  display: flex;
  align-items: center;
  height: 100%;
  flex: 1;
}

.tabBtn {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 0 16px;
  height: 100%;
  cursor: pointer;
  font-size: 12.5px;
  font-family: var(--font);
  font-weight: 500;
  letter-spacing: 0.02em;
  position: relative;
  transition: color var(--dur) var(--ease);
  white-space: nowrap;
}

.tabBtn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 16px;
  right: 16px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transition: transform var(--dur) var(--ease);
}

.tabBtn:hover { color: var(--text-primary); }
.tabBtn.active { color: var(--text-primary); }
.tabBtn.active::after { transform: scaleX(1); }

/* Storage btn in header */
#storageTabBtn {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 0 14px;
  height: 100%;
  cursor: pointer;
  font-size: 12.5px;
  font-family: var(--font);
  font-weight: 500;
  transition: color var(--dur) var(--ease);
  display: flex;
  align-items: center;
  gap: 6px;
}
#storageTabBtn:hover { color: var(--text-primary); }

/* =============================================
   RIBBON PANEL
   ============================================= */
#ribbonBar {
  height: var(--ribbon-h);
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 190;
}

.ribbonPanel {
  display: none;
  align-items: center;
  height: 100%;
  padding: 0 8px;
  gap: 2px;
  overflow-x: auto;
  overflow-y: hidden;
}
.ribbonPanel::-webkit-scrollbar { display: none; }
.ribbonPanel.active { display: flex; }

/* =============================================
   TOOL GROUPS
   ============================================= */
.group {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 8px;
  position: relative;
}

.group::after {
  content: '';
  position: absolute;
  right: 0;
  top: 20%;
  height: 60%;
  width: 1px;
  background: var(--border);
}
.group:last-child::after { display: none; }

/* ---- Tool Buttons ---- */
.group button,
.ribbon-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--dur) var(--ease),
              color var(--dur) var(--ease),
              border-color var(--dur) var(--ease);
  position: relative;
  flex-shrink: 0;
}

.group button:hover,
.ribbon-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-bright);
}

.group button.active,
.ribbon-btn.active {
  background: var(--bg-active);
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

/* Wide text buttons */
.group button.btn-text {
  width: auto;
  padding: 0 12px;
  gap: 6px;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  color: var(--text-secondary);
}
.group button.btn-text:hover { color: var(--text-primary); }

/* ---- Inputs ---- */
.group input[type="color"] {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  background: var(--bg-panel);
  cursor: pointer;
  padding: 3px;
  flex-shrink: 0;
}
.group input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.group input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

.group input[type="number"] {
  width: 54px;
  height: 34px;
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  background: var(--bg-panel);
  color: var(--text-primary);
  font-family: var(--mono);
  font-size: 12px;
  text-align: center;
  padding: 0 6px;
  flex-shrink: 0;
}
.group input[type="number"]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

/* Label above groups */
.group-label {
  position: absolute;
  bottom: 3px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
}

/* =============================================
   SIDEBAR (Page thumbnails)
   ============================================= */
#sidebar {
  position: absolute;
  left: 0;
  top: var(--total-top);
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg-chrome);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  transition: transform .3s var(--ease);
  padding: 10px 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 100;
}

#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

#sidebar.hidden { transform: translateX(calc(-1 * var(--sidebar-w))); }

.thumb {
  width: 100%;
  height: 72px;
  background: #fff;
  cursor: pointer;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  transition: border-color var(--dur) var(--ease), transform var(--dur) var(--ease);
  display: block;
}
.thumb:hover { border-color: var(--border-bright); transform: scale(1.02); }
.thumb.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

/* =============================================
   CANVAS AREA
   ============================================= */
#canvasContainer {
  position: absolute;
  left: var(--sidebar-w);
  top: var(--total-top);
  right: 0;
  bottom: 0;
  background: var(--bg-app);
  overflow: auto;
  transition: left .3s var(--ease);
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
}

#canvasContainer.full { left: 0; }
#canvasContainer.scrollMode { cursor: grab; }
#canvasContainer.scrollMode:active { cursor: grabbing; }

canvas {
  display: block;
  margin: 30px auto;
  background: #ffffff;
  touch-action: none;
  border-radius: var(--radius-md);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), var(--shadow-lg);
}

/* =============================================
   SHAPE PANEL (dropdown)
   ============================================= */
#shapePanel {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 10px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  position: absolute;
  top: calc(var(--total-top) + 8px);
  left: calc(var(--sidebar-w) + 8px);
  box-shadow: var(--shadow-lg);
  border-radius: var(--radius-md);
  z-index: 500;
  min-width: 210px;
  animation: dropIn 0.15s var(--ease);
}

#shapePanel.hidden { display: none; }

@keyframes dropIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

#shapePanel .shape-section-label {
  width: 100%;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 2px 2px 4px;
}

#shapePanel button {
  width: 36px;
  height: 36px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: background var(--dur) var(--ease),
              color var(--dur) var(--ease),
              border-color var(--dur) var(--ease),
              transform var(--dur) var(--ease);
}

#shapePanel button:hover {
  background: var(--bg-active);
  color: var(--accent);
  border-color: var(--accent);
  transform: scale(1.1);
}

/* =============================================
   GRAPH PANEL
   ============================================= */
#graphPanel {
  position: fixed;
  top: 80px;
  right: 40px;
  width: 660px;
  height: 520px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  z-index: 5000;
  overflow: hidden;
}

#graphPanel.hidden { display: none; }

#graphHeader {
  background: var(--bg-chrome);
  color: var(--text-primary);
  padding: 0 16px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: move;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#graphHeader span {
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 8px;
}
#graphHeader span::before {
  content: '';
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

#graphHeader button {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}
#graphHeader button:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

#graphControls {
  display: flex;
  gap: 6px;
  padding: 10px 12px;
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#graphControls input {
  flex: 1;
  padding: 7px 12px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--mono);
  font-size: 12px;
}
#graphControls input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
#graphControls input::placeholder { color: var(--text-dim); }

#graphControls button {
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 11.5px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--dur) var(--ease);
}
#graphControls button:hover { background: var(--bg-active); color: var(--text-primary); border-color: var(--border-bright); }

#plotBtn { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
#plotBtn:hover { opacity: 0.9; }

#graphContainer { flex: 1; min-height: 0; }

.graphFloatingBtn {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  z-index: 5000;
  box-shadow: 0 4px 20px var(--accent-glow);
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  display: flex;
  align-items: center;
  justify-content: center;
}
.graphFloatingBtn:hover { transform: scale(1.1); box-shadow: 0 6px 28px var(--accent-glow); }

/* =============================================
   RECORDING PANEL
   ============================================= */
#recordingPanel {
  position: fixed;
  top: 0;
  right: 0;
  width: 300px;
  height: 100%;
  background: var(--bg-panel);
  border-left: 1px solid var(--border-bright);
  box-shadow: var(--shadow-lg);
  transform: translateX(100%);
  transition: transform .3s var(--ease);
  z-index: 9999;
  display: flex;
  flex-direction: column;
}

#recordingHeader {
  padding: 14px 16px;
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}

#recordingHeader button {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 10px;
  transition: all var(--dur) var(--ease);
}
#recordingHeader button:hover { background: var(--danger); color: #fff; }

#recordingList {
  padding: 12px;
  overflow-y: auto;
  flex: 1;
}
#recordingList::-webkit-scrollbar { width: 4px; }
#recordingList::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

.recordItem {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 8px;
  background: var(--bg-hover);
  font-size: 12px;
  color: var(--text-secondary);
}
.recordItem > div { margin-bottom: 8px; color: var(--text-primary); font-weight: 500; }

.recordItem button {
  margin-right: 6px;
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.recordItem button:hover { background: var(--bg-active); color: var(--text-primary); }

/* =============================================
   CAMERA BUBBLE
   ============================================= */
#cameraBubble {
  position: fixed;
  bottom: 40px;
  right: 24px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid var(--danger);
  box-shadow: 0 0 0 4px rgba(248,113,113,0.3), var(--shadow-lg);
  z-index: 9998;
  display: none;
  cursor: grab;
  animation: bubblePulse 1.4s infinite;
  background: #000;
  transition: width .2s, height .2s, border-radius .2s;
}
#cameraBubble:active { cursor: grabbing; }
#cameraBubble video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1); /* mirror effect */
  pointer-events: none;
}
#cameraBubble .bubble-close {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  color: #fff;
  font-size: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  opacity: 0;
  transition: opacity .2s;
}
#cameraBubble:hover .bubble-close { opacity: 1; }
#cameraBubble.show { display: block; }

@keyframes bubblePulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(248,113,113,0.3), var(--shadow-lg); }
  50%       { box-shadow: 0 0 0 8px rgba(248,113,113,0.15), var(--shadow-lg); }
}
/* =============================================
   STORAGE PANEL
   ============================================= */
.panel {
  position: fixed;
  right: 0;
  top: 0;
  width: 440px;
  height: 100%;
  background: var(--bg-panel);
  border-left: 1px solid var(--border-bright);
  box-shadow: var(--shadow-lg);
  padding: 24px;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform .3s var(--ease);
  z-index: 9999;
}
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }
.panel.open { transform: translateX(0); }

.panel h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel h2::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 18px;
  background: var(--accent);
  border-radius: 3px;
}

#storageInfo {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--bg-hover);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

#storageTable {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
}
#storageTable th {
  text-align: left;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
}
#storageTable td {
  padding: 10px 10px;
  font-size: 12px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
#storageTable tr:hover td { background: var(--bg-hover); color: var(--text-primary); }
#storageTable td button {
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--accent);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
#storageTable td button:hover { background: var(--accent); color: #fff; }

.panel > button:last-child {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 12.5px;
  font-family: var(--font);
  cursor: pointer;

<script>

const params = new URLSearchParams(window.location.search);
const boardID = params.get("board") || "default";
const storageKey = "whiteboardData_" + boardID;
/* TAB SWITCHING */
document.querySelectorAll(".tabBtn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".ribbonPanel").forEach(p=>p.classList.remove("active"));
btn.classList.add("active");
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
let tool="pen";
let pages=[];
let current=0;
let drawing=false,currentStroke=null;
let selectedImage=null,dragging=false,resizing=false,offsetX=0,offsetY=0;
let mediaRecorder;
let recordedChunks=[];
let audioStream;
let liveRecorder = null; // LiveRecorder instance

let seconds=0;
let timerInterval;

let selectedShape=null;
let shapeDragging=false;
let shapeResizing=false;
let shapeOffsetX=0,shapeOffsetY=0;
let shapeTool=null;
// ===== STROKE SELECTION SYSTEM =====
let selectedStrokes = [];
let selectingStroke = false;
let selectionBox = null;

let movingStrokes = false;
let moveStartX = 0;
let moveStartY = 0;
let scrollMode = false;
let isPanning = false;
let panPointerId = null;
let panStartX = 0, panStartY = 0;
let scrollStartX = 0, scrollStartY = 0;
let toolBeforeScroll = "pen";
/* LOCAL STORAGE – PER BOARD */

function saveToLocalStorage(){
let data = pages.map(p => ({
bg: p.bg,
strokes: p.strokes,
images: p.images.map(img => ({
src: img.img.src,
x: img.x,
y: img.y,
w: img.w,
h: img.h
})),
shapes: p.shapes || []   // ✅ ADD THIS
}));

localStorage.setItem(storageKey, JSON.stringify({
pages: data,
current: current
}));
}

function loadFromLocalStorage(){
let saved = localStorage.getItem(storageKey);

if(!saved){
pages = [{bg:"#ffffff",strokes:[],images:[],shapes:[],undo:[],redo:[]}];
return;
}

let parsed = JSON.parse(saved);

pages = parsed.pages.map(p => {
let images = [];

p.images.forEach(imgData => {
let img = new Image();
img.src = imgData.src;

images.push({
img: img,
x: imgData.x,
y: imgData.y,
w: imgData.w,
h: imgData.h
});
});

return {
bg: p.bg,
strokes: p.strokes || [],
images: images,
shapes: p.shapes || [],   // ✅ ADD THIS
undo: [],
redo: []
};
});

current = parsed.current || 0;
}
/* SAVE STATE FOR UNDO */
function saveState(){
let p = pages[current];

p.undo.push(JSON.stringify({
strokes: p.strokes,
images: p.images.map(img => ({
src: img.img.src,
x: img.x,
y: img.y,
w: img.w,
h: img.h
})),
shapes: p.shapes
}));

p.redo = [];
}

/* REDRAW */
function redraw(){

const p = pages[current];

ctx.clearRect(0,0,canvas.width,canvas.height);
/* ===== BACKGROUND ===== */
ctx.fillStyle = p.bg;
ctx.fillRect(0,0,canvas.width,canvas.height);


/* =====================================================
   =============== DRAW SHAPES FIRST ===================
   ===================================================== */

(p.shapes || []).forEach(s=>{
ctx.strokeStyle = s.color || "#000";
ctx.fillStyle   = s.color || "#000";
ctx.lineWidth   = 2;


/* ---------- RECTANGLE ---------- */
if(s.type==="rect"){
ctx.strokeRect(s.x,s.y,s.w,s.h);
}


/* ---------- CIRCLE ---------- */
if(s.type==="circle"){
ctx.beginPath();
ctx.ellipse(
s.x + s.w/2,
s.y + s.h/2,
Math.abs(s.w/2),
Math.abs(s.h/2),
0,0,Math.PI*2
);
ctx.stroke();
}


/* ---------- LINE ---------- */
if(s.type==="line"){
ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.stroke();
}


/* ---------- ARROW ---------- */
if(s.type==="arrow"){

let x1=s.x, y1=s.y;
let x2=s.x+s.w, y2=s.y+s.h;

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.stroke();

/* arrow head */
let angle=Math.atan2(y2-y1,x2-x1);
let head=15;

ctx.beginPath();
ctx.moveTo(x2,y2);
ctx.lineTo(
x2-head*Math.cos(angle-Math.PI/6),
y2-head*Math.sin(angle-Math.PI/6)
);
ctx.lineTo(
x2-head*Math.cos(angle+Math.PI/6),
y2-head*Math.sin(angle+Math.PI/6)
);
ctx.closePath();
ctx.fill();
}


/* ---------- PARALLELOGRAM ---------- */
if(s.type==="para"){
ctx.beginPath();
ctx.moveTo(s.x+30,s.y);
ctx.lineTo(s.x+s.w,s.y);
ctx.lineTo(s.x+s.w-30,s.y+s.h);
ctx.lineTo(s.x,s.y+s.h);
ctx.closePath();
ctx.stroke();
}


/* ---------- RHOMBUS ---------- */
if(s.type==="rhombus"){
ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h/2);
ctx.lineTo(s.x+s.w/2,s.y+s.h);
ctx.lineTo(s.x,s.y+s.h/2);
ctx.closePath();
ctx.stroke();
}


/* ---------- TRAPEZIUM ---------- */
if(s.type==="trapezium"){
ctx.beginPath();
ctx.moveTo(s.x+30,s.y);
ctx.lineTo(s.x+s.w-30,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.lineTo(s.x,s.y+s.h);
ctx.closePath();
ctx.stroke();
}


/* ---------- CUBE ---------- */
if(s.type==="cube"){
let offset=20;

ctx.strokeRect(s.x,s.y,s.w,s.h);
ctx.strokeRect(s.x+offset,s.y-offset,s.w,s.h);

ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x+offset,s.y-offset);

ctx.moveTo(s.x+s.w,s.y);
ctx.lineTo(s.x+s.w+offset,s.y-offset);

ctx.moveTo(s.x,s.y+s.h);
ctx.lineTo(s.x+offset,s.y+s.h-offset);

ctx.moveTo(s.x+s.w,s.y+s.h);
ctx.lineTo(s.x+s.w+offset,s.y+s.h-offset);
ctx.stroke();
}


/* ---------- CYLINDER ---------- */
if(s.type==="cylinder"){

ctx.beginPath();
ctx.ellipse(s.x+s.w/2,s.y,s.w/2,20,0,0,Math.PI*2);
ctx.stroke();

ctx.strokeRect(s.x,s.y,s.w,s.h);

ctx.beginPath();
ctx.ellipse(s.x+s.w/2,s.y+s.h,s.w/2,20,0,0,Math.PI);
ctx.stroke();
}


/* ---------- SPHERE ---------- */
if(s.type==="sphere"){

ctx.beginPath();
ctx.arc(
s.x+s.w/2,
s.y+s.h/2,
Math.abs(s.w/2),
0,Math.PI*2
);
ctx.stroke();

/* horizontal curve */
ctx.beginPath();
ctx.ellipse(
s.x+s.w/2,
s.y+s.h/2,
s.w/2,
15,
0,0,Math.PI*2
);
ctx.stroke();
}


/* ---------- CONE ---------- */
if(s.type==="cone"){

ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x,s.y+s.h);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.closePath();
ctx.stroke();

ctx.beginPath();
ctx.ellipse(
s.x+s.w/2,
s.y+s.h,
s.w/2,
15,
0,0,Math.PI
);
ctx.stroke();
}


/* ---------- PYRAMID ---------- */
if(s.type==="pyramid"){

ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x,s.y+s.h);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.closePath();
ctx.stroke();

ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x+s.w/2,s.y+s.h);
ctx.stroke();
}


/* ---------- SELECTION OUTLINE ---------- */
if(s===selectedShape){

ctx.strokeStyle="blue";
ctx.lineWidth=2;

ctx.strokeRect(s.x,s.y,s.w,s.h);

/* resize handle */
ctx.fillStyle="blue";
ctx.fillRect(s.x+s.w-10,s.y+s.h-10,10,10);
}

});

/* ===== DRAW IMAGES ===== */
p.images.forEach(img=>{
ctx.drawImage(img.img,img.x,img.y,img.w,img.h);

if(img===selectedImage){
ctx.strokeStyle="blue";
ctx.strokeRect(img.x,img.y,img.w,img.h);
ctx.fillRect(img.x+img.w-10,img.y+img.h-10,10,10);
}
});

/* ===== DRAW STROKES ===== */
p.strokes.forEach(s=>{
    ctx.strokeStyle = s.color;
    ctx.lineWidth = s.size;
    ctx.lineCap = "round";

    // highlighter alpha
    if(s.type === "highlighter"){
        ctx.globalAlpha = s.alpha || 0.3;
    } else {
        ctx.globalAlpha = 1;
    }

    ctx.beginPath();
    ctx.moveTo(s.points[0].x, s.points[0].y);
    for(let i=1;i<s.points.length;i++)
        ctx.lineTo(s.points[i].x,s.points[i].y);
    ctx.stroke();

    ctx.globalAlpha = 1; // reset for next element
});

/* ===== STROKE SELECTION HIGHLIGHT ===== */
if(selectedStrokes.length){
  highlightSelectedStrokes();
}

/* ===== DRAW LIVE CAMERA BUBBLE ONTO CANVAS ===== */
if(liveRecorder) liveRecorder.drawBubble(ctx, canvas);

/* ===== PUSH FRAME INTO VIDEO STREAM ===== */
if(liveRecorder) liveRecorder.pushFrame();

updateThumbs();
}

/* POINTER EVENTS */
function pos(e){
  const r = canvas.getBoundingClientRect();

  return {
    x: (e.clientX - r.left) / scale,
    y: (e.clientY - r.top) / scale
  };
}
canvas.onpointerdown=e=>{
if(scrollMode){
    isPanning = true;
    panPointerId = e.pointerId;
    panStartX = e.clientX;
    panStartY = e.clientY;
    scrollStartX = canvas.parentElement.scrollLeft;
    scrollStartY = canvas.parentElement.scrollTop;
    e.preventDefault(); // stop accidental drawing
    return; // skip all other drawing logic
}
const p=pos(e);

selectedImage=null;
selectedShape=null;

/* ===== SHAPE SELECTION FIRST ===== */
for(let i=pages[current].shapes.length-1;i>=0;i--){
let s=pages[current].shapes[i];

if(p.x>s.x && p.x<s.x+s.w &&
   p.y>s.y && p.y<s.y+s.h){

selectedShape=s;

if(p.x>s.x+s.w-10 && p.y>s.y+s.h-10){
shapeResizing=true;
}else{
shapeDragging=true;
shapeOffsetX=p.x-s.x;
shapeOffsetY=p.y-s.y;
}

redraw();
return;
}
}

/* ===== IMAGE SELECTION ===== */
for(let i=pages[current].images.length-1;i>=0;i--){
let img=pages[current].images[i];

if(p.x>img.x&&p.x<img.x+img.w&&p.y>img.y&&p.y<img.y+img.h){

selectedImage=img;

if(p.x>img.x+img.w-10&&p.y>img.y+img.h-10){
resizing=true;
}else{
dragging=true;
offsetX=p.x-img.x;
offsetY=p.y-img.y;
}

redraw();
return;
}
}

/* ===== STROKE SELECTION MODE ===== */
if(tool === "selectStroke"){

  // check if clicking on already selected stroke (for move)
  const hit = selectedStrokes.some(stroke =>
    stroke.points.some(pt =>
      Math.abs(pt.x - p.x) < 8 &&
      Math.abs(pt.y - p.y) < 8
    )
  );

  if(hit){
    movingStrokes = true;
    moveStartX = p.x;
    moveStartY = p.y;
    return;
  }

  // otherwise start selection box
  selectedStrokes = [];
  selectingStroke = true;
  selectionBox = {
    x: p.x,
    y: p.y,
    w: 0,
    h: 0
  };

  return;
}
/* ===== CREATE NEW SHAPE ===== */
if(tool==="shape" && shapeTool){
saveState();

let newShape={
type:shapeTool,
x:p.x,
y:p.y,
w:0,
h:0,
color:colorPicker.value
};

pages[current].shapes.push(newShape);
selectedShape=newShape;
shapeResizing=true;
return;
}

/* ===== ERASER ===== */
if(tool==="eraser"){
eraseAt(p);
return;
}

/* ===== DRAW STROKE ===== */
drawing = true;
saveState();

currentStroke = {
    color: colorPicker.value,
    size: +sizePicker.value,
    points: [],
    type: tool // add type property
};

// If highlighter, override color & alpha
if(tool === "highlighter"){
    currentStroke.color = colorPicker.value || "#ffff00"; // default yellow
    currentStroke.alpha = 0.3; // semi-transparent
}

currentStroke.points.push(p);
pages[current].strokes.push(currentStroke);
};

canvas.onpointermove=e=>{
if(scrollMode && isPanning && e.pointerId === panPointerId){
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    canvas.parentElement.scrollLeft = scrollStartX - dx;
    canvas.parentElement.scrollTop = scrollStartY - dy;
    e.preventDefault();
    return; // skip drawing logic
}
const p=pos(e);
/* ===== DRAW SELECTION BOX ===== */
if(selectingStroke && selectionBox){
  selectionBox.w = p.x - selectionBox.x;
  selectionBox.h = p.y - selectionBox.y;
  redraw();
  drawSelectionBox();
  return;
}

/* ===== MOVE SELECTED STROKES ===== */
if(movingStrokes){
  const dx = p.x - moveStartX;
  const dy = p.y - moveStartY;

  selectedStrokes.forEach(stroke=>{
    stroke.points.forEach(pt=>{
      pt.x += dx;
      pt.y += dy;
    });
  });

  moveStartX = p.x;
  moveStartY = p.y;

  redraw();
  return;
}

/* ===== SHAPE RESIZE ===== */
if(shapeResizing && selectedShape){
selectedShape.w=p.x-selectedShape.x;
selectedShape.h=p.y-selectedShape.y;
redraw();
return;
}

/* ===== SHAPE DRAG ===== */
if(shapeDragging && selectedShape){
selectedShape.x=p.x-shapeOffsetX;
selectedShape.y=p.y-shapeOffsetY;
redraw();
return;
}

/* ===== IMAGE RESIZE ===== */
if(resizing && selectedImage){
selectedImage.w=p.x-selectedImage.x;
selectedImage.h=p.y-selectedImage.y;
redraw();
return;
}

/* ===== IMAGE DRAG ===== */
if(dragging && selectedImage){
selectedImage.x=p.x-offsetX;
selectedImage.y=p.y-offsetY;
redraw();
return;
}

/* ===== DRAWING ===== */
if(drawing){
if(tool==="eraser"){
eraseAt(p);
return;
}
currentStroke.points.push(p);
redraw();
}
};

canvas.onpointerup = (e) => {
if(scrollMode && isPanning && e.pointerId === panPointerId){
    isPanning = false;
    panPointerId = null;
    return; // skip rest of pointerup logic
}

  /* ===== FINISH STROKE SELECTION ===== */
  if(selectingStroke && selectionBox){

    selectingStroke = false;

    const box = normalizeBox(selectionBox);

    selectedStrokes = pages[current].strokes.filter(stroke =>
      stroke.points.some(pt =>
        pt.x >= box.x &&
        pt.x <= box.x + box.w &&
        pt.y >= box.y &&
        pt.y <= box.y + box.h
      )
    );

    selectionBox = null;

    redraw();
    highlightSelectedStrokes();
    return;
  }

  /* ===== STOP MOVING STROKES ===== */
  if(movingStrokes){
    movingStrokes = false;
    saveToLocalStorage();
    return;
  }

  /* ===== STOP DRAWING ===== */
  drawing = false;

  /* ===== STOP IMAGE DRAG / RESIZE ===== */
  dragging = false;
  resizing = false;

  /* ===== STOP SHAPE DRAG / RESIZE ===== */
  shapeDragging = false;
  shapeResizing = false;

  /* ===== SAVE AFTER NORMAL ACTION ===== */
 saveToLocalStorage();
cloudAutoSaveTrigger();
};
/* ERASER */
function eraseAt(p){
saveState();
pages[current].strokes=pages[current].strokes.filter(st=>{
return !st.points.some(pt=>{
let dx=pt.x-p.x,dy=pt.y-p.y;
return dx*dx+dy*dy<(st.size+5)**2;
});
});
redraw();
saveToLocalStorage();
}

/* THUMBNAILS */
function updateThumbs(){
sidebar.innerHTML="";

pages.forEach((p,i)=>{

const t=document.createElement("canvas");
t.width=100;
t.height=70;

const tc=t.getContext("2d");

/* Background */
tc.fillStyle=p.bg;
tc.fillRect(0,0,100,70);

/* Scale */
tc.save();
tc.scale(100/canvas.width,70/canvas.height);

/* ===== DRAW SHAPES FIRST ===== */
p.shapes?.forEach(s=>{
tc.strokeStyle=s.color || "#000";
tc.lineWidth=2;

if(s.type==="rect"){
tc.strokeRect(s.x,s.y,s.w,s.h);
}

if(s.type==="circle"){
tc.beginPath();
tc.ellipse(
s.x+s.w/2,
s.y+s.h/2,
Math.abs(s.w/2),
Math.abs(s.h/2),
0,0,Math.PI*2
);
tc.stroke();
}
});

/* ===== DRAW IMAGES ===== */
p.images.forEach(img=>{
tc.drawImage(img.img,img.x,img.y,img.w,img.h);
});

/* ===== DRAW STROKES ===== */
p.strokes.forEach(s=>{
tc.strokeStyle=s.color;
tc.lineWidth=s.size;
tc.beginPath();
tc.moveTo(s.points[0].x,s.points[0].y);
for(let j=1;j<s.points.length;j++){
tc.lineTo(s.points[j].x,s.points[j].y);
}
tc.stroke();
});

tc.restore();

/* UI */
t.className="thumb"+(i===current?" active":"");
t.onclick=()=>{current=i;redraw();};
sidebar.appendChild(t);

});
}

<script>
// ====== CONFIG ======
const GAS_URL = "https://script.google.com/macros/s/AKfycbxctA7ymLqqIPST3dcBeAL3Knu7iav09YxE0kjkwB63H5bvxhU1JINcBzfJOpC22DM-Gw/exec";

let userEmail = "";
let userName = "";
let enterTime = null;
let lastHeartbeat = null;

function getBoardIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("board") || "DefaultBoard";
}

const boardId = getBoardIdFromURL();

function handleCredentialResponse(response) {
  const data = parseJwt(response.credential);
  userEmail = data.email;
  userName = data.name;

  enterTime = new Date();
  lastHeartbeat = new Date();

  logBoard("enter");
  startHeartbeat();
  setupExitLog();
}

function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g,'+').replace(/_/g,'/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(jsonPayload);
}

function logBoard(action, duration = "") {
  if(!userEmail || !userName) return;

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      email: userEmail,
      name: userName,
      boardId: boardId,
      action: action,
      duration: duration
    }),
    headers: {"Content-Type":"application/json"}
  });
}

let heartbeatInterval;
function startHeartbeat(){
  heartbeatInterval = setInterval(()=>{
    lastHeartbeat = new Date();
    logBoard("heartbeat");
  },30000);
}

function setupExitLog(){
  window.addEventListener("beforeunload", ()=>{
    if(userEmail && userName && enterTime){

      const exitTime = new Date();

      const durationMinutes = Math.max(
        (exitTime.getTime() - enterTime.getTime()) / 60000,
        0.01
      ).toFixed(2);

      navigator.sendBeacon(GAS_URL, JSON.stringify({
        email: userEmail,
        name: userName,
        boardId: boardId,
        action: "exit",
        duration: durationMinutes
      }));

      clearInterval(heartbeatInterval);
    }
  });
}
</script>

});

    scale *= scaleFactor;
    applyZoom();
});

document.getElementById('zoomOutBtn').addEventListener('click', () => {
    scale /= scaleFactor;
    applyZoom();
});

function applyZoom() {
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
    redraw(); // redraw all strokes, shapes, and images with the new scale
}

    w: Math.abs(box.w),
    h: Math.abs(box.h)
  };
}

<script>
/* =============================================================
   LiveRecorder — encapsulates all recording logic cleanly
   
   HOW IT WORKS:
   • canvas.captureStream(0)  → on-demand mode (no auto-ticking)
   • Every redraw() calls liveRecorder.pushFrame() which calls
     videoTrack.requestFrame() — so EVERY pixel change (stroke,
     erase, shape, image) is explicitly pushed into the stream.
   • The RAF renderLoop() runs at 60fps during recording, which
     continuously calls redraw() → pushFrame(), keeping the
     camera bubble animation smooth and live in the video.
   • Camera video is drawn directly onto the canvas via
     drawBubble(), so it's captured by captureStream.
   ============================================================= */

class LiveRecorder {

  constructor(canvasEl, videoEl, bubbleEl) {
    this.canvas     = canvasEl;
    this.videoEl    = videoEl;   // <video id="bubbleVideo">
    this.bubbleEl   = bubbleEl;  // <div id="cameraBubble">

    this.mediaRecorder  = null;
    this.chunks         = [];
    this.cameraStream   = null;
    this.videoTrack     = null;   // canvas stream video track
    this.rafId          = null;

    // Timer
    this.seconds        = 0;
    this.timerInterval  = null;

    // Camera bubble position on canvas (bottom-right default)
    this.bubble = { x: null, y: null, size: 160, pad: 24, dragging: false, ox: 0, oy: 0 };

    // Bind canvas drag listeners for bubble repositioning
    this._onPointerDown = this._bubblePointerDown.bind(this);
    this._onPointerMove = this._bubblePointerMove.bind(this);
    this._onPointerUp   = this._bubblePointerUp.bind(this);
  }

  /* ── PUBLIC: start ── */
  async start() {
    if(this.mediaRecorder && this.mediaRecorder.state !== "inactive") return;

    // 1. Request camera + mic
    try {
      this.cameraStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    } catch(e) {
      try {
        this.cameraStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch(err) {
        alert("Microphone access is required to record."); return;
      }
    }

    // 2. Show DOM camera bubble (for the presenter's preview)
    this.videoEl.srcObject = this.cameraStream;
    this.bubbleEl.classList.add("show");

    // 3. Reset bubble canvas position
    this.bubble.x = null;
    this.bubble.y = null;

    // 4. Set up on-demand canvas stream (captureStream(0))
    //    captureStream(0) means: "only capture when I call requestFrame()"
    //    This guarantees every single redraw() is captured — nothing missed.
    const canvasStream = this.canvas.captureStream(0);
    this.videoTrack = canvasStream.getVideoTracks()[0];

    // 5. Combine canvas video + mic audio into one stream
    const combined = new MediaStream([
      ...canvasStream.getTracks(),
      ...this.cameraStream.getAudioTracks()
    ]);

    // 6. Pick best supported MIME type
    const mimeType = ["video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm","video/mp4"]
      .find(t => MediaRecorder.isTypeSupported(t)) || "video/webm";

    // 7. Create MediaRecorder
    this.chunks = [];
    this.mediaRecorder = new MediaRecorder(combined, { mimeType });

    this.mediaRecorder.ondataavailable = e => {
      if(e.data.size > 0) this.chunks.push(e.data);
    };

    this.mediaRecorder.onstop = () => this._onStop(mimeType);

    this.mediaRecorder.start(100); // collect a chunk every 100ms

    // 8. Start RAF render loop — redraws canvas every frame,
    //    which in turn calls pushFrame() to feed the stream
    this._startRenderLoop();

    // 9. Start timer display
    this.seconds = 0;
    this._updateTimerDisplay();
    this.timerInterval = setInterval(() => {
      this.seconds++;
      this._updateTimerDisplay();
    }, 1000);

    // 10. Register canvas drag listeners for bubble
    this.canvas.addEventListener("pointerdown", this._onPointerDown, true);
    this.canvas.addEventListener("pointermove", this._onPointerMove, true);
    this.canvas.addEventListener("pointerup",   this._onPointerUp,   true);

    // 11. Update UI
    recordingIndicator.style.display = "flex";
    recordTimer.style.display = "block";
    startRecordBtn.disabled = true;
    stopRecordBtn.disabled  = false;
  }

  /* ── PUBLIC: pause ── */
  pause() {
    if(this.mediaRecorder?.state === "recording") {
      this.mediaRecorder.pause();
      clearInterval(this.timerInterval);
      this._stopRenderLoop();
      recordingIndicator.style.opacity = "0.4";
    }
  }

  /* ── PUBLIC: resume ── */
  resume() {
    if(this.mediaRecorder?.state === "paused") {
      this.mediaRecorder.resume();
      this.timerInterval = setInterval(() => {
        this.seconds++;
        this._updateTimerDisplay();
      }, 1000);
      this._startRenderLoop();
      recordingIndicator.style.opacity = "1";
    }
  }

  /* ── PUBLIC: stop ── */
  stop() {
    if(!this.mediaRecorder || this.mediaRecorder.state === "inactive") return;

    this.mediaRecorder.stop();
    this.cameraStream?.getTracks().forEach(t => t.stop());
    this.videoTrack = null; // stop pushing frames

    clearInterval(this.timerInterval);
    this._stopRenderLoop();

    // Hide DOM bubble
    this.bubbleEl.classList.remove("show");
    this.videoEl.srcObject = null;

    // Hide recording UI
    recordingIndicator.style.display  = "none";
    recordingIndicator.style.opacity  = "1";
    recordTimer.style.display         = "none";
    recordTimer.innerText             = "00:00";

    // Update buttons
    startRecordBtn.disabled = false;
    stopRecordBtn.disabled  = true;

    // Remove canvas drag listeners
    this.canvas.removeEventListener("pointerdown", this._onPointerDown, true);
    this.canvas.removeEventListener("pointermove", this._onPointerMove, true);
    this.canvas.removeEventListener("pointerup",   this._onPointerUp,   true);
  }

  /* ── PUBLIC: pushFrame — called at end of every redraw() ── */
  pushFrame() {
    if(this.videoTrack && this.mediaRecorder?.state === "recording") {
      try { this.videoTrack.requestFrame(); } catch(e) {}
    }
  }

  /* ── PUBLIC: drawBubble — called inside redraw() to paint camera onto canvas ── */
  drawBubble(ctx, canvas) {
    if(!this.videoTrack) return;                          // not recording
    if(!this.videoEl?.srcObject) return;                  // no camera
    if(this.videoEl.readyState < 2) return;               // video not ready

    const b  = this.bubble;
    if(b.x === null) {
      b.x = canvas.width  - b.size - b.pad;
      b.y = canvas.height - b.size - b.pad;
    }
    const r  = b.size / 2;
    const cx = b.x + r;
    const cy = b.y + r;

    ctx.save();

    // Drop shadow
    ctx.shadowColor    = "rgba(0,0,0,0.6)";
    ctx.shadowBlur     = 20;
    ctx.shadowOffsetY  = 4;

    // Circular clip
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.clip();

    // Draw mirrored video
    ctx.translate(cx, cy);
    ctx.scale(-1, 1);
    ctx.drawImage(this.videoEl, -r, -r, b.size, b.size);
    ctx.scale(-1, 1);
    ctx.translate(-cx, -cy);

    ctx.restore();

    // Pulsing red border
    const pulse = 0.3 + 0.15 * Math.sin(Date.now() / 280);
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle   = "#f87171";
    ctx.lineWidth     = 4;
    ctx.shadowColor   = `rgba(248,113,113,${pulse})`;
    ctx.shadowBlur    = 14;
    ctx.stroke();
    ctx.restore();

    // LIVE label
    ctx.save();
    ctx.font      = "bold 12px 'DM Sans', sans-serif";
    ctx.fillStyle = "rgba(248,113,113,0.95)";
    ctx.shadowColor = "rgba(0,0,0,0.7)";
    ctx.shadowBlur  = 4;
    ctx.fillText("● LIVE", cx - r + 9, cy - r + 19);
    ctx.restore();
  }

  /* ── PRIVATE: RAF render loop ── */
  _startRenderLoop() {
    if(this.rafId) return;
    const loop = () => {
      if(!this.rafId) return;
      redraw(); // redraw() calls pushFrame() and drawBubble() at its end
      this.rafId = requestAnimationFrame(loop);
    };
    this.rafId = requestAnimationFrame(loop);
  }

  _stopRenderLoop() {
    if(this.rafId) {
      cancelAnimationFrame(this.rafId);
      this.rafId = null;
    }
  }

  /* ── PRIVATE: save & download on stop ── */
  _onStop(mimeType) {
    const ext  = mimeType.includes("mp4") ? "mp4" : "webm";
    const blob = new Blob(this.chunks, { type: mimeType });
    const url  = URL.createObjectURL(blob);

    // Auto-download
    const a = document.createElement("a");
    a.href     = url;
    a.download = "recording_" + new Date().toISOString().slice(0,19).replace(/[:T]/g,"-") + "." + ext;
    a.click();

    // Save to history
    let history = JSON.parse(localStorage.getItem("recordingHistory") || "[]");
    history.push({ id: Date.now(), url, ext, date: new Date().toLocaleString() });
    localStorage.setItem("recordingHistory", JSON.stringify(history));
    loadRecordingHistory();
  }

  /* ── PRIVATE: timer display ── */
  _updateTimerDisplay() {
    const m = String(Math.floor(this.seconds / 60)).padStart(2, "0");
    const s = String(this.seconds % 60).padStart(2, "0");
    recordTimer.innerText = m + ":" + s;
  }

  /* ── PRIVATE: drag bubble on canvas ── */
  _bubblePointerDown(e) {
    const p = pos(e);
    const b = this.bubble;
    if(b.x === null) return;
    const r = b.size / 2, cx = b.x + r, cy = b.y + r;
    if(Math.hypot(p.x - cx, p.y - cy) <= r) {
      b.dragging = true;
      b.ox = p.x - b.x;
      b.oy = p.y - b.y;
      e.stopImmediatePropagation();
    }
  }

  _bubblePointerMove(e) {
    if(!this.bubble.dragging) return;
    const p = pos(e);
    const b = this.bubble;
    b.x = Math.max(0, Math.min(this.canvas.width  - b.size, p.x - b.ox));
    b.y = Math.max(0, Math.min(this.canvas.height - b.size, p.y - b.oy));
  }

  _bubblePointerUp() {
    this.bubble.dragging = false;
  }
}

/* ── Wire up buttons ── */
startRecordBtn.onclick  = () => {
  liveRecorder = new LiveRecorder(
    canvas,
    document.getElementById("bubbleVideo"),
    document.getElementById("cameraBubble")
  );
  liveRecorder.start();
};

pauseRecordBtn.onclick  = () => liveRecorder?.pause();
resumeRecordBtn.onclick = () => liveRecorder?.resume();
stopRecordBtn.onclick   = () => liveRecorder?.stop();
</script>

 "Used: " + (data.totalSize/1024).toFixed(2) + " KB";

}

<script>
/* =============================================================
   LIVE ROOM — Firebase Realtime DB + WebRTC
   Google Meet-style admission:
     • Admin creates room → draws on whiteboard
     • Viewers join via link → land in LOBBY (waiting screen)
     • Admin sees approval popup → Admit / Deny
     • Admitted viewers see read-only canvas + video panel
     • Admin can kick any viewer at any time
   ============================================================= */

/* ── Firebase init ── */
const firebaseConfig = {
  apiKey:            "AIzaSyCtvevbs_-Wp1Wh6TNhgrN1KZp7_6f0dfs",
  authDomain:        "prowhiteboard-20dc0.firebaseapp.com",
  databaseURL:       "https://prowhiteboard-20dc0-default-rtdb.firebaseio.com",
  projectId:         "prowhiteboard-20dc0",
  storageBucket:     "prowhiteboard-20dc0.firebasestorage.app",
  messagingSenderId: "851259077192",
  appId:             "1:851259077192:web:a9ace3040034c8342d1e7d"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const rtdb  = firebase.database();
const fauth = firebase.auth();

// Sign in anonymously — gives every user a real auth.uid for security rules
let MY_UID = null;
fauth.signInAnonymously().catch(e => console.warn("Auth failed:", e));
fauth.onAuthStateChanged(user => { if (user) MY_UID = user.uid; });

/* ── Identity & state ── */
const MY_PEER_ID = "p" + Math.random().toString(36).slice(2, 10);
let MY_ROLE      = null;   // "admin" | "viewer"
let roomRef      = null;
let currentRoom  = null;
let localStream  = null;
let viewerStream = null;
const peerConns  = {};

const ICE_SERVERS = { iceServers: [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" }
]};

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
function showRoomToast(msg, ms = 3200) {
  const el = document.getElementById("roomToast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), ms);
}

/* ─────────────────────────────────────────
   MEDIA HELPERS
───────────────────────────────────────── */
async function getAdminStream() {
  if (localStream) return localStream;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) {
    try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch(err) { showRoomToast("⚠️ No camera/mic — continuing without media"); }
  }
  return localStream;
}

async function getViewerStream() {
  if (viewerStream) return viewerStream;
  try {
    viewerStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) {
    try { viewerStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch(err) { /* viewer proceeds without media */ }
  }
  return viewerStream;
}

/* ─────────────────────────────────────────
   VIDEO TILE MANAGEMENT
───────────────────────────────────────── */
function addPeerTile(peerId, stream, label = "Peer") {
  const tileId = "tile-" + peerId;
  let tile = document.getElementById(tileId);
  if (tile) { const v = tile.querySelector("video"); if (v) v.srcObject = stream; return; }
  tile = document.createElement("div");
  tile.id = tileId;
  tile.className = "peer-tile" + (peerId === MY_PEER_ID ? " self-tile" : "");
  const video = document.createElement("video");
  video.autoplay = true; video.playsInline = true; video.muted = (peerId === MY_PEER_ID);
  video.srcObject = stream;
  tile.appendChild(video);
  const lbl = document.createElement("div");
  lbl.className = "peer-label"; lbl.textContent = label;
  tile.appendChild(lbl);
  // Kick button (only admin sees it, not on own tile)
  if (MY_ROLE === "admin" && peerId !== MY_PEER_ID) {
    const kick = document.createElement("button");
    kick.className = "kick-btn"; kick.title = "Remove viewer";
    kick.innerHTML = '<i class="fa fa-xmark"></i>';
    kick.onclick = () => kickViewer(peerId);
    tile.appendChild(kick);
  }
  document.getElementById("participantTiles").appendChild(tile);
}

function removePeerTile(peerId) {
  document.getElementById("tile-" + peerId)?.remove();
}

/* ─────────────────────────────────────────
   WEBRTC
───────────────────────────────────────── */
async function createPeerConn(peerId, isInitiator) {
  if (peerConns[peerId]) return peerConns[peerId];
  const pc = new RTCPeerConnection(ICE_SERVERS);
  peerConns[peerId] = pc;

  const stream = MY_ROLE === "admin" ? localStream : viewerStream;
  if (stream) stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = e => {
    if (e.streams && e.streams[0]) {
      if (MY_ROLE === "viewer") {
        // Route host video directly into the viewer overlay panel
        const hostVid = document.getElementById("hostVideo");
        if (hostVid) hostVid.srcObject = e.streams[0];
      } else {
        // Admin sees viewer tiles in the participant tray
        addPeerTile(peerId, e.streams[0], "Viewer");
      }
    }
  };

  pc.onicecandidate = e => {
    if (e.candidate && roomRef)
      roomRef.child("ice/" + MY_PEER_ID + "__" + peerId).push(e.candidate.toJSON());
  };

  pc.onconnectionstatechange = () => {
    if (["disconnected","failed","closed"].includes(pc.connectionState)) {
      removePeerTile(peerId); pc.close(); delete peerConns[peerId];
    }
  };

  if (isInitiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    roomRef.child("offers/" + MY_PEER_ID + "__" + peerId).set({ type: offer.type, sdp: offer.sdp });
  }
  return pc;
}

/* ─────────────────────────────────────────
   FIREBASE SIGNALING LISTENERS (shared)
───────────────────────────────────────── */
function listenSignals() {
  roomRef.child("offers").on("child_added", async snap => {
    const [from, to] = snap.key.split("__");
    if (to !== MY_PEER_ID) return;
    const pc = await createPeerConn(from, false);
    if (pc.signalingState !== "stable") return;
    await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    roomRef.child("answers/" + MY_PEER_ID + "__" + from).set({ type: answer.type, sdp: answer.sdp });
  });

  roomRef.child("answers").on("child_added", async snap => {
    const [from, to] = snap.key.split("__");
    if (to !== MY_PEER_ID) return;
    const pc = peerConns[from];
    if (pc && pc.signalingState === "have-local-offer")
      await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
  });

  roomRef.child("ice").on("child_added", snap => {
    const [from, to] = snap.key.split("__");
    if (to !== MY_PEER_ID) return;
    const pc = peerConns[from];
    if (!pc) return;
    snap.forEach(child => pc.addIceCandidate(new RTCIceCandidate(child.val())).catch(() => {}));
  });
}

/* ═════════════════════════════════════════
   ADMIN — CREATE ROOM
═════════════════════════════════════════ */
async function createRoom() {
  // Wait for anonymous auth to complete before writing (security rules need auth.uid)
  if (!MY_UID) {
    showRoomToast("⏳ Connecting… please try again in a moment");
    await new Promise(res => fauth.onAuthStateChanged(u => { if (u) { MY_UID = u.uid; res(); } }));
  }
  const roomId = Math.random().toString(36).slice(2, 8).toUpperCase();
  MY_ROLE      = "admin";
  currentRoom  = roomId;
  roomRef      = rtdb.ref("liverooms/" + roomId);

  // Mark this room with the auth UID as adminId — security rules check this
  const adminId = MY_UID || MY_PEER_ID;  // MY_UID is the real auth.uid
  await roomRef.child("meta").set({ adminId, createdAt: Date.now() });
  roomRef.child("meta").onDisconnect().remove();  // clean up room on admin leave

  await getAdminStream();
  if (localStream) addPeerTile(MY_PEER_ID, localStream, "You (Host)");

  listenSignals();

  // Watch for knock requests
  roomRef.child("knock").on("child_added", snap => {
    const viewerId   = snap.key;
    const viewerName = snap.val().name || viewerId.slice(0, 8);
    showAdmissionPopup(viewerId, viewerName);
  });

  // Watch for viewers being admitted — connect WebRTC to them
  roomRef.child("admitted").on("child_added", snap => {
    const viewerId = snap.key;
    if (viewerId === MY_PEER_ID) return;
    showRoomToast("✅ Viewer admitted");
    createPeerConn(viewerId, true);  // admin initiates
  });

  // Watch for viewer leaving
  roomRef.child("admitted").on("child_removed", snap => {
    const viewerId = snap.key;
    removePeerTile(viewerId);
    const pc = peerConns[viewerId];
    if (pc) { pc.close(); delete peerConns[viewerId]; }
    showRoomToast("👋 A viewer left");
    updateViewerCount();
  });

  setRoomUI(true, roomId, "admin");
  showRoomToast("🎉 Room created!");

  // Push initial empty snapshot
  pushBoardSnapshot();

  // Show invite modal
  const link = buildInviteLink(roomId);
  document.getElementById("inviteRoomId").textContent = roomId;
  document.getElementById("inviteLink").textContent   = link;
  document.getElementById("roomInviteModal").classList.add("open");
}

/* ─────────────────────────────────────────
   ADMIN — ADMISSION POPUP (Google Meet style)
───────────────────────────────────────── */
function showAdmissionPopup(viewerId, viewerName) {

  if (document.getElementById("admit-" + viewerId)) return;

  `;
  pop.innerHTML = `

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));

    // Remove from knock queue
    roomRef.child("knock/" + viewerId).remove();
    updateViewerCount();
  };

  setTimeout(() => { pop.remove(); }, 30000);

/* ─────────────────────────────────────────
   ADMIN — KICK VIEWER
───────────────────────────────────────── */
function kickViewer(viewerId) {
  if (!roomRef) return;
  roomRef.child("admitted/" + viewerId).update({ kicked: true });
  setTimeout(() => roomRef.child("admitted/" + viewerId).remove(), 1000);
  removePeerTile(viewerId);
  const pc = peerConns[viewerId];
  if (pc) { pc.close(); delete peerConns[viewerId]; }
  showRoomToast("🚫 Viewer removed");
  updateViewerCount();
}

function updateViewerCount() {
  roomRef.child("admitted").once("value", snap => {
    const count = snap.numChildren();
    const el = document.getElementById("viewerCountBadge");
    if (el) el.textContent = count > 0 ? count + " viewer" + (count > 1 ? "s" : "") : "";
  });
}

/* ═════════════════════════════════════════
   VIEWER — KNOCK (request to join)
═════════════════════════════════════════ */
async function knockOnRoom(roomId) {
  roomId = roomId.trim().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 8);
  if (!roomId) { showRoomToast("❌ Enter a Room ID first"); return; }
  if (currentRoom) { showRoomToast("⚠️ Already in a room"); return; }

  // Check room exists
  const metaSnap = await rtdb.ref("liverooms/" + roomId + "/meta").once("value");
  if (!metaSnap.exists()) { showRoomToast("❌ Room not found"); return; }

  MY_ROLE     = "viewer";
  currentRoom = roomId;
  roomRef     = rtdb.ref("liverooms/" + roomId);

  await getViewerStream();

  // Show waiting lobby
  showLobbyScreen(roomId);

  // Write knock request
  const viewerName = "Viewer-" + MY_PEER_ID.slice(1, 6).toUpperCase();
  await roomRef.child("knock/" + MY_PEER_ID).set({ name: viewerName, ts: Date.now() });
  roomRef.child("knock/" + MY_PEER_ID).onDisconnect().remove();

  // Watch for admission or denial
  roomRef.child("admitted/" + MY_PEER_ID).on("value", async snap => {
    const val = snap.val();
    if (!val) return;

    if (val.kicked) {
      // Admin kicked us
      hideLobbyScreen();
      hideViewerMode();
      leaveRoom();
      showRoomToast("🚫 You were removed by the host");
      return;
    }

    // Admitted!
    hideLobbyScreen();
    enterViewerMode(roomId);
    listenSignals();

    // Register in admitted list with onDisconnect cleanup
    roomRef.child("admitted/" + MY_PEER_ID).onDisconnect().remove();

    // Load board snapshot immediately
    loadBoardSnapshot(roomId);

    // Also watch for snapshot updates (admin cleared board, changed page, etc.)
    roomRef.child("boardSnapshot").on("value", snap => {
      if (!snap.val()) return;
      loadBoardSnapshot(roomId);
    });

    // Listen for live strokes in real-time
    roomRef.child("strokes").on("child_added", snap => {
      const data = snap.val();
      if (!data || data.userId === MY_PEER_ID) return;
      replayRemoteStroke(data);
    });

    setRoomUI(true, roomId, "viewer");
    showRoomToast("✅ Admitted! Welcome.");
  });

  roomRef.child("knock/" + MY_PEER_ID).on("value", snap => {
    if (snap.val()?.denied) {
      hideLobbyScreen();
      currentRoom = null; MY_ROLE = null; roomRef = null;
      setRoomUI(false);
      showRoomToast("❌ The host denied your request");
    }
  });

  // Watch for host ending the session
  roomRef.child("sessionEnded").on("value", snap => {
    if (!snap.val()) return;
    hideLobbyScreen();
    hideViewerMode();
    showRoomToast("📵 The host ended the session");
    // Clean up without writing anything back
    if (roomRef) {
      roomRef.child("offers").off();
      roomRef.child("answers").off();
      roomRef.child("ice").off();
      roomRef.child("strokes").off();
      roomRef.child("knock").off();
      roomRef.child("admitted").off();
      roomRef.child("boardSnapshot").off();
      roomRef.child("sessionEnded").off();
    }
    Object.entries(peerConns).forEach(([id, pc]) => { pc.close(); removePeerTile(id); delete peerConns[id]; });
    if (viewerStream) { viewerStream.getTracks().forEach(t => t.stop()); viewerStream = null; }
    removePeerTile(MY_PEER_ID);
    roomRef = null; currentRoom = null; MY_ROLE = null;
    setRoomUI(false);
  });
}

    <style>@keyframes vmPulse{0%,100%{opacity:1}50%{opacity:.4}}</style>
  `;
  document.body.appendChild(ov);

  // Wire leave button
  document.getElementById("viewerLeaveBtn").onclick = leaveRoom;

  // Show viewer's own video
  const selfVid = document.getElementById("viewerSelfVideo");
  if (selfVid && viewerStream) selfVid.srcObject = viewerStream;

  // Route incoming host video to #hostVideo
  // (set by createPeerConn ontrack, but just in case set it now)
}

function hideViewerMode() {
  document.getElementById("viewerModeOverlay")?.remove();
}

/* ─────────────────────────────────────────
   VIEWER — LOAD & RENDER BOARD SNAPSHOT
───────────────────────────────────────── */
function loadBoardSnapshot(roomId) {
  rtdb.ref("liverooms/" + roomId + "/boardSnapshot").once("value", snap => {
    const snapshot = snap.val();
    const vctx = getViewerCtx();
    if (!vctx || !snapshot || !snapshot.pages) {
      updateViewerSyncStatus("⚠️ No board data yet");
      return;
    }
    const normPts = pts => {
      if (!pts) return [];
      if (Array.isArray(pts)) return pts;
      return Object.keys(pts).sort((a,b) => Number(a)-Number(b)).map(k => pts[k]);
    };
    const pagesRaw = Array.isArray(snapshot.pages) ? snapshot.pages
      : Object.keys(snapshot.pages).sort((a,b) => Number(a)-Number(b)).map(k => snapshot.pages[k]);

    const curPage = pagesRaw[snapshot.currentPage || 0] || pagesRaw[0];
    if (!curPage) return;

    const bg = curPage.bg || "#ffffff";
    vctx.fillStyle = bg;
    vctx.fillRect(0, 0, 1600, 2000);

    const strokesRaw = Array.isArray(curPage.strokes) ? curPage.strokes
      : Object.keys(curPage.strokes || {}).sort((a,b) => Number(a)-Number(b)).map(k => curPage.strokes[k]);

    // Draw shapes first (behind strokes)
    const shapesRaw = Array.isArray(curPage.shapes) ? curPage.shapes
      : Object.keys(curPage.shapes || {}).sort((a,b) => Number(a)-Number(b)).map(k => curPage.shapes[k]);
    shapesRaw.forEach(s => {
      vctx.save();
      vctx.strokeStyle = s.color || "#000";
      vctx.fillStyle   = s.color || "#000";
      vctx.lineWidth   = 2;
      if (s.type === "rect")   { vctx.strokeRect(s.x, s.y, s.w, s.h); }
      else if (s.type === "circle") {
        vctx.beginPath();
        vctx.ellipse(s.x+s.w/2, s.y+s.h/2, Math.abs(s.w/2), Math.abs(s.h/2), 0, 0, Math.PI*2);
        vctx.stroke();
      }
      else if (s.type === "line") {
        vctx.beginPath(); vctx.moveTo(s.x, s.y); vctx.lineTo(s.x+s.w, s.y+s.h); vctx.stroke();
      }
      else if (s.type === "arrow") {
        const ang = Math.atan2(s.h, s.w), head = 15;
        vctx.beginPath(); vctx.moveTo(s.x, s.y); vctx.lineTo(s.x+s.w, s.y+s.h); vctx.stroke();
        vctx.beginPath();
        vctx.moveTo(s.x+s.w, s.y+s.h);
        vctx.lineTo(s.x+s.w - head*Math.cos(ang-Math.PI/6), s.y+s.h - head*Math.sin(ang-Math.PI/6));
        vctx.lineTo(s.x+s.w - head*Math.cos(ang+Math.PI/6), s.y+s.h - head*Math.sin(ang+Math.PI/6));
        vctx.closePath(); vctx.fill();
      }
      vctx.restore();
    });

    // Draw strokes
    strokesRaw.forEach(s => {
      const pts = normPts(s.points);
      if (pts.length < 2) return;
      vctx.save();
      vctx.strokeStyle = s.color || "#000";
      vctx.lineWidth   = s.size  || 2;
      vctx.lineCap     = "round"; vctx.lineJoin = "round";
      vctx.globalAlpha = (s.stroke_type === "highlighter" || s.type === "highlighter") ? (s.alpha || 0.3) : 1;
      vctx.beginPath();
      vctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) vctx.lineTo(pts[i].x, pts[i].y);
      vctx.stroke(); vctx.restore();
    });

    updateViewerSyncStatus("✅ Synced " + new Date().toLocaleTimeString());
  });
}

function getViewerCtx() {
  const vc = document.getElementById("viewerCanvas");
  return vc ? vc.getContext("2d") : null;
}

function updateViewerSyncStatus(msg) {
  const el = document.getElementById("viewerSyncStatus");
  if (el) el.textContent = msg;
}

/* ─────────────────────────────────────────
   VIEWER — REPLAY LIVE STROKES ONTO VIEWER CANVAS
───────────────────────────────────────── */
function replayRemoteStroke(data) {
  if (!data.points) return;
  const points = Array.isArray(data.points)
    ? data.points
    : Object.keys(data.points).sort((a,b) => Number(a)-Number(b)).map(k => data.points[k]);
  if (points.length < 2) return;

  if (MY_ROLE === "viewer") {
    // Draw directly onto viewerCanvas
    const vctx = getViewerCtx();
    if (!vctx) return;
    vctx.save();
    vctx.strokeStyle = data.color || "#000";
    vctx.lineWidth   = data.size  || 2;
    vctx.lineCap     = "round"; vctx.lineJoin = "round";
    vctx.globalAlpha = (data.stroke_type === "highlighter") ? (data.alpha || 0.3) : 1;
    vctx.beginPath();
    vctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) vctx.lineTo(points[i].x, points[i].y);
    vctx.stroke(); vctx.restore();
    updateViewerSyncStatus("✅ Synced " + new Date().toLocaleTimeString());
  } else {
    // Admin receiving own strokes from another device (legacy)
    const pageIdx = data.page != null ? data.page : 0;
    if (!pages[pageIdx]) return;
    pages[pageIdx].strokes.push({
      color: data.color || "#000", size: data.size || 3,
      type: data.stroke_type || "pen", alpha: data.alpha || 1, points
    });
    if (pageIdx === current) redraw();
    saveToLocalStorage();
  }
}

/* ─────────────────────────────────────────
   STROKE BROADCAST (admin only)
───────────────────────────────────────── */
function broadcastStroke(stroke) {
  if (!roomRef || MY_ROLE !== "admin" || !stroke || stroke.points.length < 2) return;
  roomRef.child("strokes").push({
    userId:      MY_PEER_ID,
    page:        current,
    color:       stroke.color,
    size:        stroke.size,
    stroke_type: stroke.type  || "pen",
    alpha:       stroke.alpha || 1,
    points:      stroke.points,
    ts:          Date.now()
  });
  pushBoardSnapshot();
}

// Debounced full board snapshot writer
let _snapshotTimer = null;
function pushBoardSnapshot() {
  if (!roomRef || MY_ROLE !== "admin") return;
  clearTimeout(_snapshotTimer);
  _snapshotTimer = setTimeout(() => {
    const snapshot = {
      currentPage: current,
      pages: pages.map(p => ({
        bg:      p.bg      || "#ffffff",
        strokes: p.strokes || [],
        shapes:  p.shapes  || []
      }))
    };
    roomRef.child("boardSnapshot").set(snapshot);
  }, 800);
}

/* ─────────────────────────────────────────
   LEAVE ROOM (works for both roles)
───────────────────────────────────────── */
function leaveRoom() {
  if (roomRef) {
    roomRef.child("offers").off();
    roomRef.child("answers").off();
    roomRef.child("ice").off();
    roomRef.child("strokes").off();
    roomRef.child("knock").off();
    roomRef.child("admitted").off();
    roomRef.child("boardSnapshot").off();

    if (MY_ROLE === "viewer") {
      roomRef.child("knock/" + MY_PEER_ID).remove();
      roomRef.child("admitted/" + MY_PEER_ID).remove();
    }
    if (MY_ROLE === "admin") {
      roomRef.child("meta").remove();
      roomRef.child("boardSnapshot").remove();
      // Notify all viewers the session ended
      roomRef.child("sessionEnded").set(true);
      setTimeout(() => roomRef.remove(), 2000);
    }
  }

  Object.entries(peerConns).forEach(([id, pc]) => {
    pc.close(); removePeerTile(id); delete peerConns[id];
  });

  if (localStream)  { localStream.getTracks().forEach(t => t.stop());  localStream  = null; }
  if (viewerStream) { viewerStream.getTracks().forEach(t => t.stop()); viewerStream = null; }

  removePeerTile(MY_PEER_ID);
  hideLobbyScreen();
  hideViewerMode();

  roomRef     = null;
  currentRoom = null;
  MY_ROLE     = null;

  setRoomUI(false);
  showRoomToast("👋 Left the room");
}

/* ─────────────────────────────────────────
   UI HELPERS
───────────────────────────────────────── */
function setRoomUI(inRoom, roomId = "", role = "") {
  document.getElementById("createRoomBtn").style.display = inRoom ? "none" : "";
  document.getElementById("joinRoomBtn").style.display   = inRoom ? "none" : "";
  document.getElementById("leaveRoomBtn").style.display  = inRoom ? "" : "none";
  document.getElementById("copyInviteBtn").style.display = (inRoom && role === "admin") ? "" : "none";
  document.getElementById("roomIdInput").disabled        = inRoom;
  document.getElementById("roomIdInput").value           = inRoom ? roomId : "";
  document.getElementById("roomStatus").textContent      = inRoom
    ? (role === "admin" ? "🟢 " + roomId + " (Host)" : "🟣 " + roomId + " (Viewer)")
    : "";
}

function buildInviteLink(roomId) {
  return location.origin + location.pathname + "?room=" + roomId;
}

/* ─────────────────────────────────────────
   BUTTON WIRING
───────────────────────────────────────── */
document.getElementById("openLiveRoomBtn").addEventListener("click", () => {
  const bar = document.getElementById("liveRoomBar");
  bar.style.display = (bar.style.display === "flex") ? "none" : "flex";
});

document.getElementById("createRoomBtn").addEventListener("click", createRoom);

document.getElementById("joinRoomBtn").addEventListener("click", () => {
  knockOnRoom(document.getElementById("roomIdInput").value);
});

document.getElementById("roomIdInput").addEventListener("keydown", e => {
  if (e.key === "Enter") knockOnRoom(e.target.value);
});

document.getElementById("leaveRoomBtn").addEventListener("click", leaveRoom);

document.getElementById("copyInviteBtn").addEventListener("click", () => {
  if (!currentRoom) return;
  navigator.clipboard.writeText(buildInviteLink(currentRoom))
    .then(() => showRoomToast("📋 Invite link copied!"))
    .catch(() => showRoomToast("❌ Copy failed"));
});

document.getElementById("copyLinkBtn").addEventListener("click", () => {
  navigator.clipboard.writeText(document.getElementById("inviteLink").textContent)
    .then(() => showRoomToast("📋 Copied!")).catch(() => {});
});

document.getElementById("closeInviteBtn").addEventListener("click", () => {
  document.getElementById("roomInviteModal").classList.remove("open");
});

/* ─────────────────────────────────────────
   AUTO-JOIN FROM URL  ?room=XXXXXX
───────────────────────────────────────── */
window.addEventListener("DOMContentLoaded", () => {
  const urlRoom = new URLSearchParams(location.search).get("room");
  if (urlRoom) {
    document.getElementById("liveRoomBar").style.display = "flex";
    document.getElementById("roomIdInput").value = urlRoom.toUpperCase();
    setTimeout(() => knockOnRoom(urlRoom), 600);
  }
});

/* ─────────────────────────────────────────
   HOOK STROKE BROADCAST (admin only)
───────────────────────────────────────── */
window.addEventListener("load", () => {
  const origUp = canvas.onpointerup;
  canvas.onpointerup = function(e) {
    if (origUp) origUp.call(this, e);
    if (MY_ROLE === "admin" && currentStroke && currentStroke.points && currentStroke.points.length > 1) {
      broadcastStroke(currentStroke);
    }
  };

  const clearBtn = document.getElementById("clearBtn");
  if (clearBtn) clearBtn.addEventListener("click", () => {
    setTimeout(() => { if (roomRef && MY_ROLE === "admin") pushBoardSnapshot(); }, 50);
  });

  const addPageBtn = document.getElementById("addPageBtn");
  if (addPageBtn) addPageBtn.addEventListener("click", () => {
    setTimeout(() => { if (roomRef && MY_ROLE === "admin") pushBoardSnapshot(); }, 50);
  });

  const deletePageBtn = document.getElementById("deletePageBtn");
  if (deletePageBtn) deletePageBtn.addEventListener("click", () => {
    setTimeout(() => { if (roomRef && MY_ROLE === "admin") pushBoardSnapshot(); }, 50);
  });

  // Push snapshot when background colour changes
  const bgPicker = document.getElementById("bgPicker");
  if (bgPicker) bgPicker.addEventListener("input", () => {
    setTimeout(() => { if (roomRef && MY_ROLE === "admin") pushBoardSnapshot(); }, 50);
  });

  // Prevent viewers from drawing — disable canvas pointer events when in viewer mode
  canvas.addEventListener("pointerdown", e => {
    if (MY_ROLE === "viewer") { e.stopImmediatePropagation(); e.preventDefault(); }
  }, true);
});
</script>

<script>
/* CAMERA BUBBLE — drag & close */
(function(){
  const bubble = document.getElementById("cameraBubble");
  const closeBtn = document.getElementById("closeBubble");

  let dragging = false, ox = 0, oy = 0;

  bubble.addEventListener("pointerdown", e=>{
    if(e.target === closeBtn) return;
    dragging = true;
    ox = e.clientX - bubble.getBoundingClientRect().left;
    oy = e.clientY - bubble.getBoundingClientRect().top;
    bubble.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  bubble.addEventListener("pointermove", e=>{
    if(!dragging) return;
    bubble.style.right = "auto";
    bubble.style.bottom = "auto";
    bubble.style.left = (e.clientX - ox) + "px";
    bubble.style.top  = (e.clientY - oy) + "px";
  });

  bubble.addEventListener("pointerup", ()=>{ dragging=false; });

  closeBtn.addEventListener("click", ()=>{
    bubble.classList.remove("show");
  });
})();
</script>
