<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProBoard — Infinite Canvas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.11.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/patternLock/0.5.0/patternLock.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/patternLock/0.5.0/patternLock.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* =============================================
   DESIGN TOKENS
   ============================================= */
:root {
  --bg-app:        #0f1117;
  --bg-chrome:     #161a23;
  --bg-panel:      #1c2030;
  --bg-hover:      #252b3b;
  --bg-active:     #2e3650;
  --border:        rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.15);
  --accent:        #4f7dff;
  --accent-glow:   rgba(79,125,255,0.35);
  --accent-2:      #a78bfa;
  --success:       #34d399;
  --danger:        #f87171;
  --warn:          #fbbf24;
  --text-primary:  #e8ecf4;
  --text-secondary:#8892a8;
  --text-dim:      #4d5568;
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.4);
  --shadow-md:     0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg:     0 12px 40px rgba(0,0,0,0.6);
  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     16px;
  --dur:           0.18s;
  --ease:          cubic-bezier(.4,0,.2,1);
  --tab-h:         40px;
  --ribbon-h:      54px;
  --total-top:     calc(var(--tab-h) + var(--ribbon-h));
  --sidebar-w:     130px;
  --font:          'DM Sans', sans-serif;
  --mono:          'DM Mono', monospace;
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg-app);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

/* =============================================
   APP HEADER / WORDMARK
   ============================================= */
#appHeader {
  display: flex;
  align-items: center;
  gap: 0;
  height: var(--tab-h);
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 200;
}

#wordmark {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 18px;
  border-right: 1px solid var(--border);
  height: 100%;
  min-width: 130px;
}

#wordmark .logo-icon {
  width: 22px;
  height: 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
  flex-shrink: 0;
}

#wordmark span {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text-primary);
}

#wordmark small {
  font-size: 9px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 1px;
}

/* =============================================
   RIBBON TABS
   ============================================= */
#ribbonTabs {
  display: flex;
  align-items: center;
  height: 100%;
  flex: 1;
}

.tabBtn {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 0 16px;
  height: 100%;
  cursor: pointer;
  font-size: 12.5px;
  font-family: var(--font);
  font-weight: 500;
  letter-spacing: 0.02em;
  position: relative;
  transition: color var(--dur) var(--ease);
  white-space: nowrap;
}

.tabBtn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 16px;
  right: 16px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transition: transform var(--dur) var(--ease);
}

.tabBtn:hover { color: var(--text-primary); }
.tabBtn.active { color: var(--text-primary); }
.tabBtn.active::after { transform: scaleX(1); }

/* Storage btn in header */
#storageTabBtn {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 0 14px;
  height: 100%;
  cursor: pointer;
  font-size: 12.5px;
  font-family: var(--font);
  font-weight: 500;
  transition: color var(--dur) var(--ease);
  display: flex;
  align-items: center;
  gap: 6px;
}
#storageTabBtn:hover { color: var(--text-primary); }

/* =============================================
   RIBBON PANEL
   ============================================= */
#ribbonBar {
  height: var(--ribbon-h);
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 190;
}

.ribbonPanel {
  display: none;
  align-items: center;
  height: 100%;
  padding: 0 8px;
  gap: 2px;
  overflow-x: auto;
  overflow-y: hidden;
}
.ribbonPanel::-webkit-scrollbar { display: none; }
.ribbonPanel.active { display: flex; }

/* =============================================
   TOOL GROUPS
   ============================================= */
.group {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 8px;
  position: relative;
}

.group::after {
  content: '';
  position: absolute;
  right: 0;
  top: 20%;
  height: 60%;
  width: 1px;
  background: var(--border);
}
.group:last-child::after { display: none; }

/* ---- Tool Buttons ---- */
.group button,
.ribbon-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--dur) var(--ease),
              color var(--dur) var(--ease),
              border-color var(--dur) var(--ease);
  position: relative;
  flex-shrink: 0;
}

.group button:hover,
.ribbon-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-bright);
}

.group button.active,
.ribbon-btn.active {
  background: var(--bg-active);
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

/* Wide text buttons */
.group button.btn-text {
  width: auto;
  padding: 0 12px;
  gap: 6px;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  color: var(--text-secondary);
}
.group button.btn-text:hover { color: var(--text-primary); }

/* ---- Inputs ---- */
.group input[type="color"] {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  background: var(--bg-panel);
  cursor: pointer;
  padding: 3px;
  flex-shrink: 0;
}
.group input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.group input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

.group input[type="number"] {
  width: 54px;
  height: 34px;
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  background: var(--bg-panel);
  color: var(--text-primary);
  font-family: var(--mono);
  font-size: 12px;
  text-align: center;
  padding: 0 6px;
  flex-shrink: 0;
}
.group input[type="number"]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

/* Label above groups */
.group-label {
  position: absolute;
  bottom: 3px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
}

/* =============================================
   SIDEBAR (Page thumbnails)
   ============================================= */
#sidebar {
  position: absolute;
  left: 0;
  top: var(--total-top);
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg-chrome);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  transition: transform .3s var(--ease);
  padding: 10px 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 100;
}

#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

#sidebar.hidden { transform: translateX(calc(-1 * var(--sidebar-w))); }

.thumb {
  width: 100%;
  height: 72px;
  background: #fff;
  cursor: pointer;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  transition: border-color var(--dur) var(--ease), transform var(--dur) var(--ease);
  display: block;
}
.thumb:hover { border-color: var(--border-bright); transform: scale(1.02); }
.thumb.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

/* =============================================
   CANVAS AREA
   ============================================= */
#canvasContainer {
  position: absolute;
  left: var(--sidebar-w);
  top: var(--total-top);
  right: 0;
  bottom: 0;
  background: var(--bg-app);
  overflow: auto;
  transition: left .3s var(--ease);
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
}

#canvasContainer.full { left: 0; }
#canvasContainer.scrollMode { cursor: grab; }
#canvasContainer.scrollMode:active { cursor: grabbing; }

canvas {
  display: block;
  margin: 30px auto;
  background: #ffffff;
  touch-action: none;
  border-radius: var(--radius-md);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), var(--shadow-lg);
}

/* =============================================
   SHAPE PANEL (dropdown)
   ============================================= */
#shapePanel {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 10px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  position: absolute;
  top: calc(var(--total-top) + 8px);
  left: calc(var(--sidebar-w) + 8px);
  box-shadow: var(--shadow-lg);
  border-radius: var(--radius-md);
  z-index: 500;
  min-width: 210px;
  animation: dropIn 0.15s var(--ease);
}

#shapePanel.hidden { display: none; }

@keyframes dropIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

#shapePanel .shape-section-label {
  width: 100%;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 2px 2px 4px;
}

#shapePanel button {
  width: 36px;
  height: 36px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: background var(--dur) var(--ease),
              color var(--dur) var(--ease),
              border-color var(--dur) var(--ease),
              transform var(--dur) var(--ease);
}

#shapePanel button:hover {
  background: var(--bg-active);
  color: var(--accent);
  border-color: var(--accent);
  transform: scale(1.1);
}

/* =============================================
   GRAPH PANEL
   ============================================= */
#graphPanel {
  position: fixed;
  top: 80px;
  right: 40px;
  width: 660px;
  height: 520px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  z-index: 5000;
  overflow: hidden;
}

#graphPanel.hidden { display: none; }

#graphHeader {
  background: var(--bg-chrome);
  color: var(--text-primary);
  padding: 0 16px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: move;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#graphHeader span {
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 8px;
}
#graphHeader span::before {
  content: '';
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

#graphHeader button {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}
#graphHeader button:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

#graphControls {
  display: flex;
  gap: 6px;
  padding: 10px 12px;
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#graphControls input {
  flex: 1;
  padding: 7px 12px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--mono);
  font-size: 12px;
}
#graphControls input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
#graphControls input::placeholder { color: var(--text-dim); }

#graphControls button {
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 11.5px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--dur) var(--ease);
}
#graphControls button:hover { background: var(--bg-active); color: var(--text-primary); border-color: var(--border-bright); }

#plotBtn { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
#plotBtn:hover { opacity: 0.9; }

#graphContainer { flex: 1; min-height: 0; }

.graphFloatingBtn {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  z-index: 5000;
  box-shadow: 0 4px 20px var(--accent-glow);
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  display: flex;
  align-items: center;
  justify-content: center;
}
.graphFloatingBtn:hover { transform: scale(1.1); box-shadow: 0 6px 28px var(--accent-glow); }

/* =============================================
   RECORDING PANEL
   ============================================= */
#recordingPanel {
  position: fixed;
  top: 0;
  right: 0;
  width: 300px;
  height: 100%;
  background: var(--bg-panel);
  border-left: 1px solid var(--border-bright);
  box-shadow: var(--shadow-lg);
  transform: translateX(100%);
  transition: transform .3s var(--ease);
  z-index: 9999;
  display: flex;
  flex-direction: column;
}

#recordingHeader {
  padding: 14px 16px;
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}

#recordingHeader button {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 10px;
  transition: all var(--dur) var(--ease);
}
#recordingHeader button:hover { background: var(--danger); color: #fff; }

#recordingList {
  padding: 12px;
  overflow-y: auto;
  flex: 1;
}
#recordingList::-webkit-scrollbar { width: 4px; }
#recordingList::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

.recordItem {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 8px;
  background: var(--bg-hover);
  font-size: 12px;
  color: var(--text-secondary);
}
.recordItem > div { margin-bottom: 8px; color: var(--text-primary); font-weight: 500; }

.recordItem button {
  margin-right: 6px;
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.recordItem button:hover { background: var(--bg-active); color: var(--text-primary); }

/* =============================================
   STORAGE PANEL
   ============================================= */
.panel {
  position: fixed;
  right: 0;
  top: 0;
  width: 440px;
  height: 100%;
  background: var(--bg-panel);
  border-left: 1px solid var(--border-bright);
  box-shadow: var(--shadow-lg);
  padding: 24px;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform .3s var(--ease);
  z-index: 9999;
}
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }
.panel.open { transform: translateX(0); }

.panel h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel h2::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 18px;
  background: var(--accent);
  border-radius: 3px;
}

#storageInfo {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--bg-hover);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

#storageTable {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
}
#storageTable th {
  text-align: left;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
}
#storageTable td {
  padding: 10px 10px;
  font-size: 12px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
#storageTable tr:hover td { background: var(--bg-hover); color: var(--text-primary); }
#storageTable td button {
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--accent);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
#storageTable td button:hover { background: var(--accent); color: #fff; }

.panel > button:last-child {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 12.5px;
  font-family: var(--font);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.panel > button:last-child:hover { background: var(--bg-active); color: var(--text-primary); }

/* =============================================
   SLIDESHOW CONTROLS
   ============================================= */
#slideshowControls {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  padding: 8px 12px;
  border-radius: 100px;
  box-shadow: var(--shadow-lg);
  gap: 6px;
  align-items: center;
  backdrop-filter: blur(12px);
}
#slideshowControls.show { display: flex; }

#slideshowControls button {
  background: var(--bg-hover);
  color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 7px 16px;
  border-radius: 100px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  transition: all var(--dur) var(--ease);
}
#slideshowControls button:hover { background: var(--bg-active); border-color: var(--border-bright); }

/* =============================================
   RECORDING INDICATOR + TIMER
   ============================================= */
#recordingIndicator {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--danger);
  color: white;
  padding: 5px 14px;
  border-radius: 100px;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.04em;
  display: none;
  z-index: 9999;
  align-items: center;
  gap: 7px;
  box-shadow: 0 2px 12px rgba(248,113,113,0.5);
  animation: pulse 1.4s infinite;
}
#recordingIndicator.show { display: flex; }

@keyframes pulse {
  0%, 100% { box-shadow: 0 2px 12px rgba(248,113,113,0.5); }
  50% { box-shadow: 0 2px 20px rgba(248,113,113,0.85); }
}

<script>
/* ================== BOARD SYSTEM (FULL FINAL) ================== */

// Generate unique board ID
function generateBoardID(){
  return "board_" + Math.random().toString(36).substr(2,9);
}

// Get board from URL
function getBoardIdFromURL(){
  const params = new URLSearchParams(window.location.search);
  return params.get("board");
}

// Initialize board
let boardID = getBoardIdFromURL();

if(!boardID){
  boardID = generateBoardID();

  const newURL =
    window.location.origin +
    window.location.pathname +
    "?board=" + boardID;

  // Set URL without reload
  window.history.replaceState({}, "", newURL);
}

console.log("Board ID:", boardID);

// Local storage key
const storageKey = "whiteboardData_" + boardID;
/* TAB SWITCHING */
document.querySelectorAll(".tabBtn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".ribbonPanel").forEach(p=>p.classList.remove("active"));
btn.classList.add("active");
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
let tool="pen";
let pages=[];
let current=0;
let drawing=false,currentStroke=null;
let selectedImage=null,dragging=false,resizing=false,offsetX=0,offsetY=0;
let mediaRecorder;
let recordedChunks=[];
let audioStream;

let seconds=0;
let timerInterval;

let selectedShape=null;
let shapeDragging=false;
let shapeResizing=false;
let shapeOffsetX=0,shapeOffsetY=0;
let shapeTool=null;
// ===== STROKE SELECTION SYSTEM =====
let selectedStrokes = [];
let selectingStroke = false;
let selectionBox = null;

let movingStrokes = false;
let moveStartX = 0;
let moveStartY = 0;
let scrollMode = false;
let isPanning = false;
let panPointerId = null;
let panStartX = 0, panStartY = 0;
let scrollStartX = 0, scrollStartY = 0;
let toolBeforeScroll = "pen";
/* LOCAL STORAGE – PER BOARD */

function saveToLocalStorage(){
let data = pages.map(p => ({
bg: p.bg,
strokes: p.strokes,
images: p.images.map(img => ({
src: img.img.src,
x: img.x,
y: img.y,
w: img.w,
h: img.h
})),
shapes: p.shapes || []   // ✅ ADD THIS
}));

localStorage.setItem(storageKey, JSON.stringify({
pages: data,
current: current
}));
}

function loadFromLocalStorage(){
let saved = localStorage.getItem(storageKey);

if(!saved){
pages = [{bg:"#ffffff",strokes:[],images:[],shapes:[],undo:[],redo:[]}];
return;
}

let parsed = JSON.parse(saved);

pages = parsed.pages.map(p => {
let images = [];

p.images.forEach(imgData => {
let img = new Image();
img.src = imgData.src;

images.push({
img: img,
x: imgData.x,
y: imgData.y,
w: imgData.w,
h: imgData.h
});
});

return {
bg: p.bg,
strokes: p.strokes || [],
images: images,
shapes: p.shapes || [],   // ✅ ADD THIS
undo: [],
redo: []
};
});

current = parsed.current || 0;
}
/* SAVE STATE FOR UNDO */
function saveState(){
let p = pages[current];

p.undo.push(JSON.stringify({
strokes: p.strokes,
images: p.images.map(img => ({
src: img.img.src,
x: img.x,
y: img.y,
w: img.w,
h: img.h
})),
shapes: p.shapes
}));

p.redo = [];
}

/* REDRAW */
function redraw(){

const p = pages[current];

ctx.clearRect(0,0,canvas.width,canvas.height);
if(selectedStrokes.length){
  highlightSelectedStrokes();
}
/* ===== BACKGROUND ===== */
ctx.fillStyle = p.bg;
ctx.fillRect(0,0,canvas.width,canvas.height);


/* =====================================================
   =============== DRAW SHAPES FIRST ===================
   ===================================================== */

(p.shapes || []).forEach(s=>{
ctx.strokeStyle = s.color || "#000";
ctx.fillStyle   = s.color || "#000";
ctx.lineWidth   = 2;


/* ---------- RECTANGLE ---------- */
if(s.type==="rect"){
ctx.strokeRect(s.x,s.y,s.w,s.h);
}


/* ---------- CIRCLE ---------- */
if(s.type==="circle"){
ctx.beginPath();
ctx.ellipse(
s.x + s.w/2,
s.y + s.h/2,
Math.abs(s.w/2),
Math.abs(s.h/2),
0,0,Math.PI*2
);
ctx.stroke();
}


/* ---------- LINE ---------- */
if(s.type==="line"){
ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.stroke();
}


/* ---------- ARROW ---------- */
if(s.type==="arrow"){

let x1=s.x, y1=s.y;
let x2=s.x+s.w, y2=s.y+s.h;

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.stroke();

/* arrow head */
let angle=Math.atan2(y2-y1,x2-x1);
let head=15;

ctx.beginPath();
ctx.moveTo(x2,y2);
ctx.lineTo(
x2-head*Math.cos(angle-Math.PI/6),
y2-head*Math.sin(angle-Math.PI/6)
);
ctx.lineTo(
x2-head*Math.cos(angle+Math.PI/6),
y2-head*Math.sin(angle+Math.PI/6)
);
ctx.closePath();
ctx.fill();
}


/* ---------- PARALLELOGRAM ---------- */
if(s.type==="para"){
ctx.beginPath();
ctx.moveTo(s.x+30,s.y);
ctx.lineTo(s.x+s.w,s.y);
ctx.lineTo(s.x+s.w-30,s.y+s.h);
ctx.lineTo(s.x,s.y+s.h);
ctx.closePath();
ctx.stroke();
}


/* ---------- RHOMBUS ---------- */
if(s.type==="rhombus"){
ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h/2);
ctx.lineTo(s.x+s.w/2,s.y+s.h);
ctx.lineTo(s.x,s.y+s.h/2);
ctx.closePath();
ctx.stroke();
}


/* ---------- TRAPEZIUM ---------- */
if(s.type==="trapezium"){
ctx.beginPath();
ctx.moveTo(s.x+30,s.y);
ctx.lineTo(s.x+s.w-30,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.lineTo(s.x,s.y+s.h);
ctx.closePath();
ctx.stroke();
}


/* ---------- CUBE ---------- */
if(s.type==="cube"){
let offset=20;

ctx.strokeRect(s.x,s.y,s.w,s.h);
ctx.strokeRect(s.x+offset,s.y-offset,s.w,s.h);

ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x+offset,s.y-offset);

ctx.moveTo(s.x+s.w,s.y);
ctx.lineTo(s.x+s.w+offset,s.y-offset);

ctx.moveTo(s.x,s.y+s.h);
ctx.lineTo(s.x+offset,s.y+s.h-offset);

ctx.moveTo(s.x+s.w,s.y+s.h);
ctx.lineTo(s.x+s.w+offset,s.y+s.h-offset);
ctx.stroke();
}


/* ---------- CYLINDER ---------- */
if(s.type==="cylinder"){

ctx.beginPath();
ctx.ellipse(s.x+s.w/2,s.y,s.w/2,20,0,0,Math.PI*2);
ctx.stroke();

ctx.strokeRect(s.x,s.y,s.w,s.h);

ctx.beginPath();
ctx.ellipse(s.x+s.w/2,s.y+s.h,s.w/2,20,0,0,Math.PI);
ctx.stroke();
}


/* ---------- SPHERE ---------- */
if(s.type==="sphere"){

ctx.beginPath();
ctx.arc(
s.x+s.w/2,
s.y+s.h/2,
Math.abs(s.w/2),
0,Math.PI*2
);
ctx.stroke();

/* horizontal curve */
ctx.beginPath();
ctx.ellipse(
s.x+s.w/2,
s.y+s.h/2,
s.w/2,
15,
0,0,Math.PI*2
);
ctx.stroke();
}


/* ---------- CONE ---------- */
if(s.type==="cone"){

ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x,s.y+s.h);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.closePath();
ctx.stroke();

ctx.beginPath();
ctx.ellipse(
s.x+s.w/2,
s.y+s.h,
s.w/2,
15,
0,0,Math.PI
);
ctx.stroke();
}


/* ---------- PYRAMID ---------- */
if(s.type==="pyramid"){

ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x,s.y+s.h);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.closePath();
ctx.stroke();

ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x+s.w/2,s.y+s.h);
ctx.stroke();
}


/* ---------- SELECTION OUTLINE ---------- */
if(s===selectedShape){

ctx.strokeStyle="blue";
ctx.lineWidth=2;

ctx.strokeRect(s.x,s.y,s.w,s.h);

/* resize handle */
ctx.fillStyle="blue";
ctx.fillRect(s.x+s.w-10,s.y+s.h-10,10,10);
}

});

/* ===== DRAW IMAGES ===== */
p.images.forEach(img=>{
ctx.drawImage(img.img,img.x,img.y,img.w,img.h);

if(img===selectedImage){
ctx.strokeStyle="blue";
ctx.strokeRect(img.x,img.y,img.w,img.h);
ctx.fillRect(img.x+img.w-10,img.y+img.h-10,10,10);
}
});

/* ===== DRAW STROKES ===== */
p.strokes.forEach(s=>{
    ctx.strokeStyle = s.color;
    ctx.lineWidth = s.size;
    ctx.lineCap = "round";

    // highlighter alpha
    if(s.type === "highlighter"){
        ctx.globalAlpha = s.alpha || 0.3;
    } else {
        ctx.globalAlpha = 1;
    }

    ctx.beginPath();
    ctx.moveTo(s.points[0].x, s.points[0].y);
    for(let i=1;i<s.points.length;i++)
        ctx.lineTo(s.points[i].x,s.points[i].y);
    ctx.stroke();

    ctx.globalAlpha = 1; // reset for next element
});

updateThumbs();
}

/* POINTER EVENTS */
function pos(e){
  const r = canvas.getBoundingClientRect();

  return {
    x: (e.clientX - r.left) / scale,
    y: (e.clientY - r.top) / scale
  };
}
canvas.onpointerdown=e=>{
if(scrollMode){
    isPanning = true;
    panPointerId = e.pointerId;
    panStartX = e.clientX;
    panStartY = e.clientY;
    scrollStartX = canvas.parentElement.scrollLeft;
    scrollStartY = canvas.parentElement.scrollTop;
    e.preventDefault(); // stop accidental drawing
    return; // skip all other drawing logic
}
const p=pos(e);

selectedImage=null;
selectedShape=null;

/* ===== SHAPE SELECTION FIRST ===== */
for(let i=pages[current].shapes.length-1;i>=0;i--){
let s=pages[current].shapes[i];

if(p.x>s.x && p.x<s.x+s.w &&
   p.y>s.y && p.y<s.y+s.h){

selectedShape=s;

if(p.x>s.x+s.w-10 && p.y>s.y+s.h-10){
shapeResizing=true;
}else{
shapeDragging=true;
shapeOffsetX=p.x-s.x;
shapeOffsetY=p.y-s.y;
}

redraw();
return;
}
}

/* ===== IMAGE SELECTION ===== */
for(let i=pages[current].images.length-1;i>=0;i--){
let img=pages[current].images[i];

if(p.x>img.x&&p.x<img.x+img.w&&p.y>img.y&&p.y<img.y+img.h){

selectedImage=img;

if(p.x>img.x+img.w-10&&p.y>img.y+img.h-10){
resizing=true;
}else{
dragging=true;
offsetX=p.x-img.x;
offsetY=p.y-img.y;
}

redraw();
return;
}
}

/* ===== STROKE SELECTION MODE ===== */
if(tool === "selectStroke"){

  // check if clicking on already selected stroke (for move)
  const hit = selectedStrokes.some(stroke =>
    stroke.points.some(pt =>
      Math.abs(pt.x - p.x) < 8 &&
      Math.abs(pt.y - p.y) < 8
    )
  );

  if(hit){
    movingStrokes = true;
    moveStartX = p.x;
    moveStartY = p.y;
    return;
  }

  // otherwise start selection box
  selectedStrokes = [];
  selectingStroke = true;
  selectionBox = {
    x: p.x,
    y: p.y,
    w: 0,
    h: 0
  };

  return;
}
/* ===== CREATE NEW SHAPE ===== */
if(tool==="shape" && shapeTool){
saveState();

let newShape={
type:shapeTool,
x:p.x,
y:p.y,
w:0,
h:0,
color:colorPicker.value
};

pages[current].shapes.push(newShape);
selectedShape=newShape;
shapeResizing=true;
return;
}

/* ===== ERASER ===== */
if(tool==="eraser"){
eraseAt(p);
return;
}

/* ===== DRAW STROKE ===== */
drawing = true;
saveState();

currentStroke = {
    color: colorPicker.value,
    size: +sizePicker.value,
    points: [],
    type: tool // add type property
};

// If highlighter, override color & alpha
if(tool === "highlighter"){
    currentStroke.color = colorPicker.value || "#ffff00"; // default yellow
    currentStroke.alpha = 0.3; // semi-transparent
}

currentStroke.points.push(p);
pages[current].strokes.push(currentStroke);
};

canvas.onpointermove=e=>{
if(scrollMode && isPanning && e.pointerId === panPointerId){
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    canvas.parentElement.scrollLeft = scrollStartX - dx;
    canvas.parentElement.scrollTop = scrollStartY - dy;
    e.preventDefault();
    return; // skip drawing logic
}
const p=pos(e);
/* ===== DRAW SELECTION BOX ===== */
if(selectingStroke && selectionBox){
  selectionBox.w = p.x - selectionBox.x;
  selectionBox.h = p.y - selectionBox.y;
  redraw();
  drawSelectionBox();
  return;
}

/* ===== MOVE SELECTED STROKES ===== */
if(movingStrokes){
  const dx = p.x - moveStartX;
  const dy = p.y - moveStartY;

  selectedStrokes.forEach(stroke=>{
    stroke.points.forEach(pt=>{
      pt.x += dx;
      pt.y += dy;
    });
  });

  moveStartX = p.x;
  moveStartY = p.y;

  redraw();
  return;
}

/* ===== SHAPE RESIZE ===== */
if(shapeResizing && selectedShape){
selectedShape.w=p.x-selectedShape.x;
selectedShape.h=p.y-selectedShape.y;
redraw();
return;
}

/* ===== SHAPE DRAG ===== */
if(shapeDragging && selectedShape){
selectedShape.x=p.x-shapeOffsetX;
selectedShape.y=p.y-shapeOffsetY;
redraw();
return;
}

/* ===== IMAGE RESIZE ===== */
if(resizing && selectedImage){
selectedImage.w=p.x-selectedImage.x;
selectedImage.h=p.y-selectedImage.y;
redraw();
return;
}

/* ===== IMAGE DRAG ===== */
if(dragging && selectedImage){
selectedImage.x=p.x-offsetX;
selectedImage.y=p.y-offsetY;
redraw();
return;
}

/* ===== DRAWING ===== */
if(drawing){
if(tool==="eraser"){
eraseAt(p);
return;
}
currentStroke.points.push(p);
redraw();
}
};

canvas.onpointerup = () => {
if(scrollMode && isPanning && e.pointerId === panPointerId){
    isPanning = false;
    panPointerId = null;
    return; // skip rest of pointerup logic
}

  /* ===== FINISH STROKE SELECTION ===== */
  if(selectingStroke && selectionBox){

    selectingStroke = false;

    const box = normalizeBox(selectionBox);

    selectedStrokes = pages[current].strokes.filter(stroke =>
      stroke.points.some(pt =>
        pt.x >= box.x &&
        pt.x <= box.x + box.w &&
        pt.y >= box.y &&
        pt.y <= box.y + box.h
      )
    );

    selectionBox = null;

    redraw();
    highlightSelectedStrokes();
    return;
  }

  /* ===== STOP MOVING STROKES ===== */
  if(movingStrokes){
    movingStrokes = false;
    saveToLocalStorage();
    return;
  }

  /* ===== STOP DRAWING ===== */
  drawing = false;

  /* ===== STOP IMAGE DRAG / RESIZE ===== */
  dragging = false;
  resizing = false;

  /* ===== STOP SHAPE DRAG / RESIZE ===== */
  shapeDragging = false;
  shapeResizing = false;

  /* ===== SAVE AFTER NORMAL ACTION ===== */
 saveToLocalStorage();
cloudAutoSaveTrigger();
};
/* ERASER */
function eraseAt(p){
saveState();
pages[current].strokes=pages[current].strokes.filter(st=>{
return !st.points.some(pt=>{
let dx=pt.x-p.x,dy=pt.y-p.y;
return dx*dx+dy*dy<(st.size+5)**2;
});
});

}

<script>
// ====== CONFIG ======
const GAS_URL = "https://script.google.com/macros/s/AKfycbxctA7ymLqqIPST3dcBeAL3Knu7iav09YxE0kjkwB63H5bvxhU1JINcBzfJOpC22DM-Gw/exec";

let userEmail = "";
let userName = "";
let enterTime = null;
let lastHeartbeat = null;

function getBoardIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("board") || "DefaultBoard";
}

const boardId = getBoardIdFromURL();

function handleCredentialResponse(response) {
  const data = parseJwt(response.credential);
  userEmail = data.email;
  userName = data.name;

  enterTime = new Date();
  lastHeartbeat = new Date();

  logBoard("enter");
  startHeartbeat();
  setupExitLog();
}

function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g,'+').replace(/_/g,'/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(jsonPayload);
}

function logBoard(action, duration = "") {
  if(!userEmail || !userName) return;

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      email: userEmail,
      name: userName,
      boardId: boardId,
      action: action,
      duration: duration
    }),
    headers: {"Content-Type":"application/json"}
  });
}

let heartbeatInterval;
function startHeartbeat(){
  heartbeatInterval = setInterval(()=>{
    lastHeartbeat = new Date();
    logBoard("heartbeat");
  },30000);
}

function setupExitLog(){
  window.addEventListener("beforeunload", ()=>{
    if(userEmail && userName && enterTime){

      const exitTime = new Date();

      const durationMinutes = Math.max(
        (exitTime.getTime() - enterTime.getTime()) / 60000,
        0.01
      ).toFixed(2);

      navigator.sendBeacon(GAS_URL, JSON.stringify({
        email: userEmail,
        name: userName,
        boardId: boardId,
        action: "exit",
        duration: durationMinutes
      }));

      clearInterval(heartbeatInterval);
    }
  });
}

<script>
selectStrokeBtn.onclick = () => {
  tool = "selectStroke";
};

penBtn.onclick = () => {
  tool = "pen";
};
function normalizeBox(box){
  return {
    x: Math.min(box.x, box.x + box.w),
    y: Math.min(box.y, box.y + box.h),
    w: Math.abs(box.w),
    h: Math.abs(box.h)
  };
}

function drawSelectionBox(){
  if(!selectionBox) return;

  ctx.save();
  ctx.strokeStyle = "blue";
  ctx.setLineDash([6]);
  ctx.strokeRect(
    selectionBox.x,
    selectionBox.y,
    selectionBox.w,
    selectionBox.h
  );
  ctx.restore();
}

function highlightSelectedStrokes(){

  selectedStrokes.forEach(stroke=>{
    ctx.save();
    ctx.strokeStyle = "blue";
    ctx.lineWidth = stroke.size + 2;
    ctx.setLineDash([4]);

    ctx.beginPath();
    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);

    for(let i=1;i<stroke.points.length;i++){
      ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
    }

    ctx.stroke();
    ctx.restore();
  });
}
cutStrokeBtn.onclick = ()=>{

  if(!selectedStrokes.length) return;

  saveState();

  pages[current].strokes =
    pages[current].strokes.filter(st =>
      !selectedStrokes.includes(st)
    );

  selectedStrokes = [];

  redraw();
  saveToLocalStorage();
};

<script>

 }
 return id;

/* SERIALIZE BOARD */

function serializeBoard(){
  return JSON.stringify({
    pages: pages.map(p => ({
      bg: p.bg,
      strokes: p.strokes,
      shapes: p.shapes || [],
      images: p.images.map(img => ({
        src: img.img.src,

        w: img.w,
        h: img.h
      }))
    })),

async function loadBoardCloud(){

  let res = await fetch(CLOUD_URL,{

      action:"loadBoard",
      boardId: boardID   // 🔥 KEY CHANGE
    })
  });

  let data = await res.json();

  if(!data.pages){

  }

  pages = data.pages.map(p => {

    let images = [];

    (p.images || []).forEach(imgData => {
      let img = new Image();
      img.src = imgData.src;

      images.push({
        img: img,
        x: imgData.x,
        y: imgData.y,
        w: imgData.w,
        h: imgData.h
      });
    });

    return {
      bg: p.bg || "#fff",
      strokes: p.strokes || [],
      shapes: p.shapes || [],
      images: images,
      undo: [],
      redo: []
    };

  });

  current = data.current || 0;

  redraw();
}
window.addEventListener("DOMContentLoaded", async () => {

  await loadBoardCloud();   // load from cloud first

  if(!pages || !pages.length){
    pages = [{
      bg:"#ffffff",
      strokes:[],
      images:[],
      shapes:[],
      undo:[],
      redo:[]
    }];
  }

  redraw();
});
/* BUTTONS */

function saveBoardToCloud(){
 saveBoardCloud();
 alert("Saved to cloud");
}

async function loadBoardFromCloud(){
 await loadBoardCloud();
 saveToLocalStorage();
 alert("Loaded from cloud");
}

function cloudAutoSaveTrigger(){
 saveBoardCloud();
}

<script>
/* RECORDING */
function updateTimer(){

seconds++;

let m=Math.floor(seconds/60).toString().padStart(2,"0");
let s=(seconds%60).toString().padStart(2,"0");

recordTimer.innerText=m+":"+s;

}

/* START RECORD */

startRecordBtn.onclick=async()=>{

const canvasStream=canvas.captureStream(30);

audioStream=await navigator.mediaDevices.getUserMedia({audio:true});

const combinedStream=new MediaStream([
...canvasStream.getTracks(),
...audioStream.getTracks()
]);

mediaRecorder=new MediaRecorder(combinedStream);

recordedChunks=[];

mediaRecorder.ondataavailable=e=>{
if(e.data.size>0) recordedChunks.push(e.data);
};

mediaRecorder.onstop=()=>{

const blob=new Blob(recordedChunks,{type:"video/webm"});

const url=URL.createObjectURL(blob);

let history=JSON.parse(localStorage.getItem("recordingHistory")||"[]");

history.push({
id:Date.now(),
url:url,
date:new Date().toLocaleString()
});

localStorage.setItem("recordingHistory",JSON.stringify(history));

loadRecordingHistory();

};

mediaRecorder.start();

recordingIndicator.style.display="block";
recordTimer.style.display="block";

seconds=0;
timerInterval=setInterval(updateTimer,1000);

startRecordBtn.disabled=true;
stopRecordBtn.disabled=false;

};

/* PAUSE */

pauseRecordBtn.onclick=()=>{

if(mediaRecorder && mediaRecorder.state==="recording"){

mediaRecorder.pause();

clearInterval(timerInterval);

}

};

/* RESUME */

resumeRecordBtn.onclick=()=>{

if(mediaRecorder && mediaRecorder.state==="paused"){

mediaRecorder.resume();

timerInterval=setInterval(updateTimer,1000);

}

};

/* STOP */

stopRecordBtn.onclick=()=>{

mediaRecorder.stop();

audioStream.getTracks().forEach(t=>t.stop());

clearInterval(timerInterval);

recordingIndicator.style.display="none";
recordTimer.style.display="none";

startRecordBtn.disabled=false;
stopRecordBtn.disabled=true;

};
</script>

let widthDiff = window.outerWidth - window.innerWidth;
let heightDiff = window.outerHeight - window.innerHeight;

if(widthDiff > 160 || heightDiff > 160){

panel.style.display = "flex";

}

}

setInterval(detectDevTools,1000);

/* Block Right Click */

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

/* Block Inspect Shortcuts */

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
panel.style.display="flex";
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
panel.style.display="flex";
}

if(e.ctrlKey && e.shiftKey && e.key==="J"){
e.preventDefault();
panel.style.display="flex";
}

if(e.ctrlKey && e.key==="U"){
e.preventDefault();
panel.style.display="flex";
}

});
