<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProBoard — Infinite Canvas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.11.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/patternLock/0.5.0/patternLock.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/patternLock/0.5.0/patternLock.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* =============================================
   DESIGN TOKENS
   ============================================= */
:root {
  --bg-app:        #0f1117;
  --bg-chrome:     #161a23;
  --bg-panel:      #1c2030;
  --bg-hover:      #252b3b;
  --bg-active:     #2e3650;
  --border:        rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.15);
  --accent:        #4f7dff;
  --accent-glow:   rgba(79,125,255,0.35);
  --accent-2:      #a78bfa;
  --success:       #34d399;
  --danger:        #f87171;
  --warn:          #fbbf24;
  --text-primary:  #e8ecf4;
  --text-secondary:#8892a8;
  --text-dim:      #4d5568;
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.4);
  --shadow-md:     0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg:     0 12px 40px rgba(0,0,0,0.6);
  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     16px;
  --dur:           0.18s;
  --ease:          cubic-bezier(.4,0,.2,1);
  --tab-h:         40px;
  --ribbon-h:      54px;
  --total-top:     calc(var(--tab-h) + var(--ribbon-h));
  --sidebar-w:     130px;
  --font:          'DM Sans', sans-serif;
  --mono:          'DM Mono', monospace;
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg-app);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

/* =============================================
   APP HEADER / WORDMARK
   ============================================= */
#appHeader {
  display: flex;
  align-items: center;
  gap: 0;
  height: var(--tab-h);
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 200;
}

#wordmark {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 18px;
  border-right: 1px solid var(--border);
  height: 100%;
  min-width: 130px;
}

#wordmark .logo-icon {
  width: 22px;
  height: 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
  flex-shrink: 0;
}

#wordmark span {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text-primary);
}

#wordmark small {
  font-size: 9px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 1px;
}

/* =============================================
   RIBBON TABS
   ============================================= */
#ribbonTabs {
  display: flex;
  align-items: center;
  height: 100%;
  flex: 1;
}

.tabBtn {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 0 16px;
  height: 100%;
  cursor: pointer;
  font-size: 12.5px;
  font-family: var(--font);
  font-weight: 500;
  letter-spacing: 0.02em;
  position: relative;
  transition: color var(--dur) var(--ease);
  white-space: nowrap;
}

.tabBtn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 16px;
  right: 16px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transition: transform var(--dur) var(--ease);
}

.tabBtn:hover { color: var(--text-primary); }
.tabBtn.active { color: var(--text-primary); }
.tabBtn.active::after { transform: scaleX(1); }

/* Storage btn in header */
#storageTabBtn {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 0 14px;
  height: 100%;
  cursor: pointer;
  font-size: 12.5px;
  font-family: var(--font);
  font-weight: 500;
  transition: color var(--dur) var(--ease);
  display: flex;
  align-items: center;
  gap: 6px;
}
#storageTabBtn:hover { color: var(--text-primary); }

/* =============================================
   RIBBON PANEL
   ============================================= */
#ribbonBar {
  height: var(--ribbon-h);
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 190;
}

.ribbonPanel {
  display: none;
  align-items: center;
  height: 100%;
  padding: 0 8px;
  gap: 2px;
  overflow-x: auto;
  overflow-y: hidden;
}
.ribbonPanel::-webkit-scrollbar { display: none; }
.ribbonPanel.active { display: flex; }

/* =============================================
   TOOL GROUPS
   ============================================= */
.group {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 8px;
  position: relative;
}

.group::after {
  content: '';
  position: absolute;
  right: 0;
  top: 20%;
  height: 60%;
  width: 1px;
  background: var(--border);
}
.group:last-child::after { display: none; }

/* ---- Tool Buttons ---- */
.group button,
.ribbon-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--dur) var(--ease),
              color var(--dur) var(--ease),
              border-color var(--dur) var(--ease);
  position: relative;
  flex-shrink: 0;
}

.group button:hover,
.ribbon-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-bright);
}

.group button.active,
.ribbon-btn.active {
  background: var(--bg-active);
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

/* Wide text buttons */
.group button.btn-text {
  width: auto;
  padding: 0 12px;
  gap: 6px;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  color: var(--text-secondary);
}
.group button.btn-text:hover { color: var(--text-primary); }

/* ---- Inputs ---- */
.group input[type="color"] {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  background: var(--bg-panel);
  cursor: pointer;
  padding: 3px;
  flex-shrink: 0;
}
.group input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.group input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

.group input[type="number"] {
  width: 54px;
  height: 34px;
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  background: var(--bg-panel);
  color: var(--text-primary);
  font-family: var(--mono);
  font-size: 12px;
  text-align: center;
  padding: 0 6px;
  flex-shrink: 0;
}
.group input[type="number"]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

/* Label above groups */
.group-label {
  position: absolute;
  bottom: 3px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
}

/* =============================================
   SIDEBAR (Page thumbnails)
   ============================================= */
#sidebar {
  position: absolute;
  left: 0;
  top: var(--total-top);
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg-chrome);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  transition: transform .3s var(--ease);
  padding: 10px 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 100;
}

#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

#sidebar.hidden { transform: translateX(calc(-1 * var(--sidebar-w))); }

.thumb {
  width: 100%;
  height: 72px;
  background: #fff;
  cursor: pointer;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  transition: border-color var(--dur) var(--ease), transform var(--dur) var(--ease);
  display: block;
}
.thumb:hover { border-color: var(--border-bright); transform: scale(1.02); }
.thumb.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

/* =============================================
   CANVAS AREA
   ============================================= */
#canvasContainer {
  position: absolute;
  left: var(--sidebar-w);
  top: var(--total-top);
  right: 0;
  bottom: 0;
  background: var(--bg-app);
  overflow: auto;
  transition: left .3s var(--ease);
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
}

#canvasContainer.full { left: 0; }
#canvasContainer.scrollMode { cursor: grab; }
#canvasContainer.scrollMode:active { cursor: grabbing; }

canvas {
  display: block;
  margin: 30px auto;
  background: #ffffff;
  touch-action: none;
  border-radius: var(--radius-md);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), var(--shadow-lg);
}

/* =============================================
   SHAPE PANEL (dropdown)
   ============================================= */
#shapePanel {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 10px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  position: absolute;
  top: calc(var(--total-top) + 8px);
  left: calc(var(--sidebar-w) + 8px);
  box-shadow: var(--shadow-lg);
  border-radius: var(--radius-md);
  z-index: 500;
  min-width: 210px;
  animation: dropIn 0.15s var(--ease);
}

#shapePanel.hidden { display: none; }

@keyframes dropIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

#shapePanel .shape-section-label {
  width: 100%;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 2px 2px 4px;
}

#shapePanel button {
  width: 36px;
  height: 36px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: background var(--dur) var(--ease),
              color var(--dur) var(--ease),
              border-color var(--dur) var(--ease),
              transform var(--dur) var(--ease);
}

#shapePanel button:hover {
  background: var(--bg-active);
  color: var(--accent);
  border-color: var(--accent);
  transform: scale(1.1);
}

/* =============================================
   GRAPH PANEL
   ============================================= */
#graphPanel {
  position: fixed;
  top: 80px;
  right: 40px;
  width: 660px;
  height: 520px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  z-index: 5000;
  overflow: hidden;
}

#graphPanel.hidden { display: none; }

#graphHeader {
  background: var(--bg-chrome);
  color: var(--text-primary);
  padding: 0 16px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: move;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#graphHeader span {
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 8px;
}
#graphHeader span::before {
  content: '';
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

#graphHeader button {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}
#graphHeader button:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

#graphControls {
  display: flex;
  gap: 6px;
  padding: 10px 12px;
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#graphControls input {
  flex: 1;
  padding: 7px 12px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--mono);
  font-size: 12px;
}
#graphControls input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
#graphControls input::placeholder { color: var(--text-dim); }

#graphControls button {
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 11.5px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--dur) var(--ease);
}
#graphControls button:hover { background: var(--bg-active); color: var(--text-primary); border-color: var(--border-bright); }

#plotBtn { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
#plotBtn:hover { opacity: 0.9; }

#graphContainer { flex: 1; min-height: 0; }

.graphFloatingBtn {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  z-index: 5000;
  box-shadow: 0 4px 20px var(--accent-glow);
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  display: flex;
  align-items: center;
  justify-content: center;
}
.graphFloatingBtn:hover { transform: scale(1.1); box-shadow: 0 6px 28px var(--accent-glow); }

/* =============================================
   RECORDING PANEL
   ============================================= */
#recordingPanel {
  position: fixed;
  top: 0;
  right: 0;
  width: 300px;
  height: 100%;
  background: var(--bg-panel);
  border-left: 1px solid var(--border-bright);
  box-shadow: var(--shadow-lg);
  transform: translateX(100%);
  transition: transform .3s var(--ease);
  z-index: 9999;
  display: flex;
  flex-direction: column;
}

#recordingHeader {
  padding: 14px 16px;
  background: var(--bg-chrome);
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}

#recordingHeader button {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 10px;
  transition: all var(--dur) var(--ease);
}
#recordingHeader button:hover { background: var(--danger); color: #fff; }

#recordingList {
  padding: 12px;
  overflow-y: auto;
  flex: 1;
}
#recordingList::-webkit-scrollbar { width: 4px; }
#recordingList::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

.recordItem {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 8px;
  background: var(--bg-hover);
  font-size: 12px;
  color: var(--text-secondary);
}
.recordItem > div { margin-bottom: 8px; color: var(--text-primary); font-weight: 500; }

.recordItem button {
  margin-right: 6px;
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.recordItem button:hover { background: var(--bg-active); color: var(--text-primary); }

/* =============================================
   CAMERA BUBBLE
   ============================================= */
#cameraBubble {
  position: fixed;
  bottom: 40px;
  right: 24px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid var(--danger);
  box-shadow: 0 0 0 4px rgba(248,113,113,0.3), var(--shadow-lg);
  z-index: 9998;
  display: none;
  cursor: grab;
  animation: bubblePulse 1.4s infinite;
  background: #000;
  transition: width .2s, height .2s, border-radius .2s;
}
#cameraBubble:active { cursor: grabbing; }
#cameraBubble video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1); /* mirror effect */
  pointer-events: none;
}
#cameraBubble .bubble-close {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  color: #fff;
  font-size: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  opacity: 0;
  transition: opacity .2s;
}
#cameraBubble:hover .bubble-close { opacity: 1; }
#cameraBubble.show { display: block; }

@keyframes bubblePulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(248,113,113,0.3), var(--shadow-lg); }
  50%       { box-shadow: 0 0 0 8px rgba(248,113,113,0.15), var(--shadow-lg); }
}
/* =============================================
   STORAGE PANEL
   ============================================= */
.panel {
  position: fixed;
  right: 0;
  top: 0;
  width: 440px;
  height: 100%;
  background: var(--bg-panel);
  border-left: 1px solid var(--border-bright);
  box-shadow: var(--shadow-lg);
  padding: 24px;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform .3s var(--ease);
  z-index: 9999;
}
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }
.panel.open { transform: translateX(0); }

.panel h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel h2::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 18px;
  background: var(--accent);
  border-radius: 3px;
}

#storageInfo {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--bg-hover);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

#storageTable {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
}
#storageTable th {
  text-align: left;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
}
#storageTable td {
  padding: 10px 10px;
  font-size: 12px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
#storageTable tr:hover td { background: var(--bg-hover); color: var(--text-primary); }
#storageTable td button {
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--accent);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
#storageTable td button:hover { background: var(--accent); color: #fff; }

.panel > button:last-child {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 12.5px;
  font-family: var(--font);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.panel > button:last-child:hover { background: var(--bg-active); color: var(--text-primary); }

/* =============================================
   SLIDESHOW CONTROLS
   ============================================= */
#slideshowControls {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);

<script>
/* BOARD ID SYSTEM */
const params = new URLSearchParams(window.location.search);
const boardID = params.get("board") || "default";
const storageKey = "whiteboardData_" + boardID;
/* TAB SWITCHING */
document.querySelectorAll(".tabBtn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".ribbonPanel").forEach(p=>p.classList.remove("active"));
btn.classList.add("active");
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
let tool="pen";
let pages=[];
let current=0;
let drawing=false,currentStroke=null;
let selectedImage=null,dragging=false,resizing=false,offsetX=0,offsetY=0;
let mediaRecorder;
let recordedChunks=[];
let audioStream;
let liveRecorder = null; // LiveRecorder instance

let seconds=0;
let timerInterval;

let selectedShape=null;
let shapeDragging=false;
let shapeResizing=false;
let shapeOffsetX=0,shapeOffsetY=0;
let shapeTool=null;
// ===== STROKE SELECTION SYSTEM =====
let selectedStrokes = [];
let selectingStroke = false;
let selectionBox = null;

let movingStrokes = false;
let moveStartX = 0;
let moveStartY = 0;
let scrollMode = false;
let isPanning = false;
let panPointerId = null;
let panStartX = 0, panStartY = 0;
let scrollStartX = 0, scrollStartY = 0;
let toolBeforeScroll = "pen";
/* LOCAL STORAGE – PER BOARD */

function saveToLocalStorage(){
let data = pages.map(p => ({
bg: p.bg,
strokes: p.strokes,
images: p.images.map(img => ({
src: img.img.src,
x: img.x,
y: img.y,
w: img.w,
h: img.h
})),
shapes: p.shapes || []   // ✅ ADD THIS
}));

localStorage.setItem(storageKey, JSON.stringify({
pages: data,
current: current
}));
}

function loadFromLocalStorage(){
let saved = localStorage.getItem(storageKey);

if(!saved){
pages = [{bg:"#ffffff",strokes:[],images:[],shapes:[],undo:[],redo:[]}];
return;
}

let parsed = JSON.parse(saved);

pages = parsed.pages.map(p => {
let images = [];

p.images.forEach(imgData => {
let img = new Image();
img.src = imgData.src;

images.push({
img: img,
x: imgData.x,
y: imgData.y,
w: imgData.w,
h: imgData.h
});
});

return {
bg: p.bg,
strokes: p.strokes || [],
images: images,
shapes: p.shapes || [],   // ✅ ADD THIS
undo: [],
redo: []
};
});

current = parsed.current || 0;
}
/* SAVE STATE FOR UNDO */
function saveState(){
let p = pages[current];

p.undo.push(JSON.stringify({
strokes: p.strokes,
images: p.images.map(img => ({
src: img.img.src,
x: img.x,
y: img.y,
w: img.w,
h: img.h
})),
shapes: p.shapes
}));

p.redo = [];
}

/* REDRAW */
function redraw(){

const p = pages[current];

ctx.clearRect(0,0,canvas.width,canvas.height);
/* ===== BACKGROUND ===== */
ctx.fillStyle = p.bg;
ctx.fillRect(0,0,canvas.width,canvas.height);


/* =====================================================
   =============== DRAW SHAPES FIRST ===================
   ===================================================== */

(p.shapes || []).forEach(s=>{
ctx.strokeStyle = s.color || "#000";
ctx.fillStyle   = s.color || "#000";
ctx.lineWidth   = 2;


/* ---------- RECTANGLE ---------- */
if(s.type==="rect"){
ctx.strokeRect(s.x,s.y,s.w,s.h);
}


/* ---------- CIRCLE ---------- */
if(s.type==="circle"){
ctx.beginPath();
ctx.ellipse(
s.x + s.w/2,
s.y + s.h/2,
Math.abs(s.w/2),
Math.abs(s.h/2),
0,0,Math.PI*2
);
ctx.stroke();
}


/* ---------- LINE ---------- */
if(s.type==="line"){
ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.stroke();
}


/* ---------- ARROW ---------- */
if(s.type==="arrow"){

let x1=s.x, y1=s.y;
let x2=s.x+s.w, y2=s.y+s.h;

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.stroke();

/* arrow head */
let angle=Math.atan2(y2-y1,x2-x1);
let head=15;

ctx.beginPath();
ctx.moveTo(x2,y2);
ctx.lineTo(
x2-head*Math.cos(angle-Math.PI/6),
y2-head*Math.sin(angle-Math.PI/6)
);
ctx.lineTo(
x2-head*Math.cos(angle+Math.PI/6),
y2-head*Math.sin(angle+Math.PI/6)
);
ctx.closePath();
ctx.fill();
}


/* ---------- PARALLELOGRAM ---------- */
if(s.type==="para"){
ctx.beginPath();
ctx.moveTo(s.x+30,s.y);
ctx.lineTo(s.x+s.w,s.y);
ctx.lineTo(s.x+s.w-30,s.y+s.h);
ctx.lineTo(s.x,s.y+s.h);
ctx.closePath();
ctx.stroke();
}


/* ---------- RHOMBUS ---------- */
if(s.type==="rhombus"){
ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h/2);
ctx.lineTo(s.x+s.w/2,s.y+s.h);
ctx.lineTo(s.x,s.y+s.h/2);
ctx.closePath();
ctx.stroke();
}


/* ---------- TRAPEZIUM ---------- */
if(s.type==="trapezium"){
ctx.beginPath();
ctx.moveTo(s.x+30,s.y);
ctx.lineTo(s.x+s.w-30,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.lineTo(s.x,s.y+s.h);
ctx.closePath();
ctx.stroke();
}


/* ---------- CUBE ---------- */
if(s.type==="cube"){
let offset=20;

ctx.strokeRect(s.x,s.y,s.w,s.h);
ctx.strokeRect(s.x+offset,s.y-offset,s.w,s.h);

ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x+offset,s.y-offset);

ctx.moveTo(s.x+s.w,s.y);
ctx.lineTo(s.x+s.w+offset,s.y-offset);

ctx.moveTo(s.x,s.y+s.h);
ctx.lineTo(s.x+offset,s.y+s.h-offset);

ctx.moveTo(s.x+s.w,s.y+s.h);
ctx.lineTo(s.x+s.w+offset,s.y+s.h-offset);
ctx.stroke();
}


/* ---------- CYLINDER ---------- */
if(s.type==="cylinder"){

ctx.beginPath();
ctx.ellipse(s.x+s.w/2,s.y,s.w/2,20,0,0,Math.PI*2);
ctx.stroke();

ctx.strokeRect(s.x,s.y,s.w,s.h);

ctx.beginPath();
ctx.ellipse(s.x+s.w/2,s.y+s.h,s.w/2,20,0,0,Math.PI);
ctx.stroke();
}


/* ---------- SPHERE ---------- */
if(s.type==="sphere"){

ctx.beginPath();
ctx.arc(
s.x+s.w/2,
s.y+s.h/2,
Math.abs(s.w/2),
0,Math.PI*2
);
ctx.stroke();

/* horizontal curve */
ctx.beginPath();
ctx.ellipse(
s.x+s.w/2,
s.y+s.h/2,
s.w/2,
15,
0,0,Math.PI*2
);
ctx.stroke();
}


/* ---------- CONE ---------- */
if(s.type==="cone"){

ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x,s.y+s.h);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.closePath();
ctx.stroke();

ctx.beginPath();
ctx.ellipse(
s.x+s.w/2,
s.y+s.h,
s.w/2,
15,
0,0,Math.PI
);
ctx.stroke();
}


/* ---------- PYRAMID ---------- */
if(s.type==="pyramid"){

ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x,s.y+s.h);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.closePath();
ctx.stroke();

ctx.beginPath();
ctx.moveTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x+s.w/2,s.y+s.h);
ctx.stroke();
}


/* ---------- SELECTION OUTLINE ---------- */
if(s===selectedShape){

ctx.strokeStyle="blue";
ctx.lineWidth=2;

ctx.strokeRect(s.x,s.y,s.w,s.h);

/* resize handle */
ctx.fillStyle="blue";
ctx.fillRect(s.x+s.w-10,s.y+s.h-10,10,10);
}

});

/* ===== DRAW IMAGES ===== */
p.images.forEach(img=>{
ctx.drawImage(img.img,img.x,img.y,img.w,img.h);

if(img===selectedImage){
ctx.strokeStyle="blue";
ctx.strokeRect(img.x,img.y,img.w,img.h);
ctx.fillRect(img.x+img.w-10,img.y+img.h-10,10,10);
}
});

/* ===== DRAW STROKES ===== */
p.strokes.forEach(s=>{
    ctx.strokeStyle = s.color;
    ctx.lineWidth = s.size;
    ctx.lineCap = "round";

    // highlighter alpha
    if(s.type === "highlighter"){
        ctx.globalAlpha = s.alpha || 0.3;
    } else {
        ctx.globalAlpha = 1;
    }

    ctx.beginPath();
    ctx.moveTo(s.points[0].x, s.points[0].y);
    for(let i=1;i<s.points.length;i++)
        ctx.lineTo(s.points[i].x,s.points[i].y);
    ctx.stroke();

    ctx.globalAlpha = 1; // reset for next element
});

/* ===== STROKE SELECTION HIGHLIGHT ===== */
if(selectedStrokes.length){
  highlightSelectedStrokes();
}

/* ===== DRAW LIVE CAMERA BUBBLE ONTO CANVAS ===== */
if(liveRecorder) liveRecorder.drawBubble(ctx, canvas);

/* ===== PUSH FRAME INTO VIDEO STREAM ===== */
if(liveRecorder) liveRecorder.pushFrame();

updateThumbs();
}

/* POINTER EVENTS */
function pos(e){
  const r = canvas.getBoundingClientRect();

  return {
    x: (e.clientX - r.left) / scale,
    y: (e.clientY - r.top) / scale
  };
}
canvas.onpointerdown=e=>{
if(scrollMode){
    isPanning = true;
    panPointerId = e.pointerId;
    panStartX = e.clientX;
    panStartY = e.clientY;
    scrollStartX = canvas.parentElement.scrollLeft;
    scrollStartY = canvas.parentElement.scrollTop;
    e.preventDefault(); // stop accidental drawing
    return; // skip all other drawing logic
}
const p=pos(e);

selectedImage=null;
selectedShape=null;

/* ===== SHAPE SELECTION FIRST ===== */
for(let i=pages[current].shapes.length-1;i>=0;i--){
let s=pages[current].shapes[i];

if(p.x>s.x && p.x<s.x+s.w &&
   p.y>s.y && p.y<s.y+s.h){

selectedShape=s;

if(p.x>s.x+s.w-10 && p.y>s.y+s.h-10){
shapeResizing=true;
}else{
shapeDragging=true;
shapeOffsetX=p.x-s.x;
shapeOffsetY=p.y-s.y;
}

redraw();
return;
}
}

/* ===== IMAGE SELECTION ===== */
for(let i=pages[current].images.length-1;i>=0;i--){
let img=pages[current].images[i];

if(p.x>img.x&&p.x<img.x+img.w&&p.y>img.y&&p.y<img.y+img.h){

selectedImage=img;

if(p.x>img.x+img.w-10&&p.y>img.y+img.h-10){
resizing=true;
}else{
dragging=true;
offsetX=p.x-img.x;
offsetY=p.y-img.y;
}

redraw();
return;
}
}

/* ===== STROKE SELECTION MODE ===== */
if(tool === "selectStroke"){

  // check if clicking on already selected stroke (for move)
  const hit = selectedStrokes.some(stroke =>
    stroke.points.some(pt =>
      Math.abs(pt.x - p.x) < 8 &&
      Math.abs(pt.y - p.y) < 8
    )
  );

  if(hit){
    movingStrokes = true;
    moveStartX = p.x;
    moveStartY = p.y;
    return;
  }

  // otherwise start selection box
  selectedStrokes = [];
  selectingStroke = true;
  selectionBox = {
    x: p.x,
    y: p.y,
    w: 0,
    h: 0
  };

  return;
}
/* ===== CREATE NEW SHAPE ===== */
if(tool==="shape" && shapeTool){
saveState();

let newShape={
type:shapeTool,
x:p.x,
y:p.y,
w:0,
h:0,
color:colorPicker.value
};

pages[current].shapes.push(newShape);
selectedShape=newShape;
shapeResizing=true;
return;
}

/* ===== ERASER ===== */
if(tool==="eraser"){
eraseAt(p);
return;
}

/* ===== DRAW STROKE ===== */
drawing = true;
saveState();

currentStroke = {
    color: colorPicker.value,
    size: +sizePicker.value,
    points: [],
    type: tool // add type property
};

// If highlighter, override color & alpha
if(tool === "highlighter"){
    currentStroke.color = colorPicker.value || "#ffff00"; // default yellow
    currentStroke.alpha = 0.3; // semi-transparent
}

currentStroke.points.push(p);
pages[current].strokes.push(currentStroke);
};

canvas.onpointermove=e=>{
if(scrollMode && isPanning && e.pointerId === panPointerId){
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    canvas.parentElement.scrollLeft = scrollStartX - dx;
    canvas.parentElement.scrollTop = scrollStartY - dy;
    e.preventDefault();
    return; // skip drawing logic
}
const p=pos(e);
/* ===== DRAW SELECTION BOX ===== */
if(selectingStroke && selectionBox){
  selectionBox.w = p.x - selectionBox.x;
  selectionBox.h = p.y - selectionBox.y;
  redraw();
  drawSelectionBox();
  return;
}

/* ===== MOVE SELECTED STROKES ===== */
if(movingStrokes){
  const dx = p.x - moveStartX;
  const dy = p.y - moveStartY;

  selectedStrokes.forEach(stroke=>{
    stroke.points.forEach(pt=>{
      pt.x += dx;
      pt.y += dy;
    });
  });

  moveStartX = p.x;
  moveStartY = p.y;

  redraw();
  return;
}

/* ===== SHAPE RESIZE ===== */
if(shapeResizing && selectedShape){
selectedShape.w=p.x-selectedShape.x;
selectedShape.h=p.y-selectedShape.y;
redraw();
return;
}

/* ===== SHAPE DRAG ===== */
if(shapeDragging && selectedShape){
selectedShape.x=p.x-shapeOffsetX;
selectedShape.y=p.y-shapeOffsetY;
redraw();
return;
}

/* ===== IMAGE RESIZE ===== */
if(resizing && selectedImage){
selectedImage.w=p.x-selectedImage.x;
selectedImage.h=p.y-selectedImage.y;
redraw();
return;
}

/* ===== IMAGE DRAG ===== */
if(dragging && selectedImage){
selectedImage.x=p.x-offsetX;
selectedImage.y=p.y-offsetY;
redraw();
return;
}

/* ===== DRAWING ===== */
if(drawing){
if(tool==="eraser"){
eraseAt(p);
return;
}
currentStroke.points.push(p);
redraw();
}
};

canvas.onpointerup = (e) => {
if(scrollMode && isPanning && e.pointerId === panPointerId){
    isPanning = false;
    panPointerId = null;
    return; // skip rest of pointerup logic
}

  /* ===== FINISH STROKE SELECTION ===== */
  if(selectingStroke && selectionBox){

    selectingStroke = false;

    const box = normalizeBox(selectionBox);

    selectedStrokes = pages[current].strokes.filter(stroke =>
      stroke.points.some(pt =>
        pt.x >= box.x &&
        pt.x <= box.x + box.w &&
        pt.y >= box.y &&
        pt.y <= box.y + box.h
      )
    );

    selectionBox = null;

    redraw();
    highlightSelectedStrokes();
    return;
  }

  /* ===== STOP MOVING STROKES ===== */
  if(movingStrokes){
    movingStrokes = false;
    saveToLocalStorage();
    return;
  }

  /* ===== STOP DRAWING ===== */
  drawing = false;

  /* ===== STOP IMAGE DRAG / RESIZE ===== */
  dragging = false;
  resizing = false;

  /* ===== STOP SHAPE DRAG / RESIZE ===== */
  shapeDragging = false;
  shapeResizing = false;

  /* ===== SAVE AFTER NORMAL ACTION ===== */
 saveToLocalStorage();
cloudAutoSaveTrigger();
};
/* ERASER */
function eraseAt(p){
saveState();
pages[current].strokes=pages[current].strokes.filter(st=>{
return !st.points.some(pt=>{
let dx=pt.x-p.x,dy=pt.y-p.y;
return dx*dx+dy*dy<(st.size+5)**2;
});
});
redraw();
saveToLocalStorage();
}

/* Background */

/* Scale */
tc.save();
tc.scale(100/canvas.width,70/canvas.height);

/* ===== DRAW SHAPES FIRST ===== */
p.shapes?.forEach(s=>{
tc.strokeStyle=s.color || "#000";
tc.lineWidth=2;

if(s.type==="rect"){
tc.strokeRect(s.x,s.y,s.w,s.h);
}

if(s.type==="circle"){
tc.beginPath();
tc.ellipse(
s.x+s.w/2,
s.y+s.h/2,
Math.abs(s.w/2),
Math.abs(s.h/2),
0,0,Math.PI*2
);
tc.stroke();
}
});

/* ===== DRAW IMAGES ===== */
p.images.forEach(img=>{
tc.drawImage(img.img,img.x,img.y,img.w,img.h);
});

/* ===== DRAW STROKES ===== */
p.strokes.forEach(s=>{
tc.strokeStyle=s.color;
tc.lineWidth=s.size;
tc.beginPath();
tc.moveTo(s.points[0].x,s.points[0].y);
for(let j=1;j<s.points.length;j++){
tc.lineTo(s.points[j].x,s.points[j].y);
}
tc.stroke();
});

tc.restore();

/* UI */
t.className="thumb"+(i===current?" active":"");
t.onclick=()=>{current=i;redraw();};
sidebar.appendChild(t);

});
}

  return params.get("board") || "DefaultBoard";
}

function handleCredentialResponse(response) {
  const data = parseJwt(response.credential);
  userEmail = data.email;
  userName = data.name;

  enterTime = new Date();
  lastHeartbeat = new Date();

  logBoard("enter");
  startHeartbeat();
  setupExitLog();
}

function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g,'+').replace(/_/g,'/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(jsonPayload);
}

function logBoard(action, duration = "") {
  if(!userEmail || !userName) return;

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      email: userEmail,
      name: userName,
      boardId: boardId,
      action: action,
      duration: duration
    }),
    headers: {"Content-Type":"application/json"}
  });
}

let heartbeatInterval;
function startHeartbeat(){
  heartbeatInterval = setInterval(()=>{
    lastHeartbeat = new Date();
    logBoard("heartbeat");
  },30000);
}

function setupExitLog(){
  window.addEventListener("beforeunload", ()=>{
    if(userEmail && userName && enterTime){

      const exitTime = new Date();

      const durationMinutes = Math.max(
        (exitTime.getTime() - enterTime.getTime()) / 60000,
        0.01
      ).toFixed(2);

      navigator.sendBeacon(GAS_URL, JSON.stringify({
        email: userEmail,
        name: userName,
        boardId: boardId,
        action: "exit",
        duration: durationMinutes
      }));

      clearInterval(heartbeatInterval);
    }
  });
}

<script>
/* =============================================================
   LiveRecorder — encapsulates all recording logic cleanly
   
   HOW IT WORKS:
   • canvas.captureStream(0)  → on-demand mode (no auto-ticking)
   • Every redraw() calls liveRecorder.pushFrame() which calls
     videoTrack.requestFrame() — so EVERY pixel change (stroke,
     erase, shape, image) is explicitly pushed into the stream.
   • The RAF renderLoop() runs at 60fps during recording, which
     continuously calls redraw() → pushFrame(), keeping the
     camera bubble animation smooth and live in the video.
   • Camera video is drawn directly onto the canvas via
     drawBubble(), so it's captured by captureStream.
   ============================================================= */

class LiveRecorder {

  constructor(canvasEl, videoEl, bubbleEl) {
    this.canvas     = canvasEl;
    this.videoEl    = videoEl;   // <video id="bubbleVideo">
    this.bubbleEl   = bubbleEl;  // <div id="cameraBubble">

    this.mediaRecorder  = null;
    this.chunks         = [];
    this.cameraStream   = null;
    this.videoTrack     = null;   // canvas stream video track
    this.rafId          = null;

    // Timer
    this.seconds        = 0;
    this.timerInterval  = null;

    // Camera bubble position on canvas (bottom-right default)
    this.bubble = { x: null, y: null, size: 160, pad: 24, dragging: false, ox: 0, oy: 0 };

    // Bind canvas drag listeners for bubble repositioning
    this._onPointerDown = this._bubblePointerDown.bind(this);
    this._onPointerMove = this._bubblePointerMove.bind(this);
    this._onPointerUp   = this._bubblePointerUp.bind(this);
  }

  /* ── PUBLIC: start ── */
  async start() {
    if(this.mediaRecorder && this.mediaRecorder.state !== "inactive") return;

    // 1. Request camera + mic
    try {
      this.cameraStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    } catch(e) {
      try {
        this.cameraStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch(err) {
        alert("Microphone access is required to record."); return;
      }
    }

    // 2. Show DOM camera bubble (for the presenter's preview)
    this.videoEl.srcObject = this.cameraStream;
    this.bubbleEl.classList.add("show");

    // 3. Reset bubble canvas position
    this.bubble.x = null;
    this.bubble.y = null;

    // 4. Set up on-demand canvas stream (captureStream(0))
    //    captureStream(0) means: "only capture when I call requestFrame()"
    //    This guarantees every single redraw() is captured — nothing missed.
    const canvasStream = this.canvas.captureStream(0);
    this.videoTrack = canvasStream.getVideoTracks()[0];

    // 5. Combine canvas video + mic audio into one stream
    const combined = new MediaStream([
      ...canvasStream.getTracks(),
      ...this.cameraStream.getAudioTracks()
    ]);

    // 6. Pick best supported MIME type
    const mimeType = ["video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm","video/mp4"]
      .find(t => MediaRecorder.isTypeSupported(t)) || "video/webm";

    // 7. Create MediaRecorder
    this.chunks = [];
    this.mediaRecorder = new MediaRecorder(combined, { mimeType });

    this.mediaRecorder.ondataavailable = e => {
      if(e.data.size > 0) this.chunks.push(e.data);
    };

    this.mediaRecorder.onstop = () => this._onStop(mimeType);

    this.mediaRecorder.start(100); // collect a chunk every 100ms

    // 8. Start RAF render loop — redraws canvas every frame,
    //    which in turn calls pushFrame() to feed the stream
    this._startRenderLoop();

    // 9. Start timer display
    this.seconds = 0;
    this._updateTimerDisplay();
    this.timerInterval = setInterval(() => {
      this.seconds++;
      this._updateTimerDisplay();
    }, 1000);

    // 10. Register canvas drag listeners for bubble
    this.canvas.addEventListener("pointerdown", this._onPointerDown, true);
    this.canvas.addEventListener("pointermove", this._onPointerMove, true);
    this.canvas.addEventListener("pointerup",   this._onPointerUp,   true);

    // 11. Update UI
    recordingIndicator.style.display = "flex";
    recordTimer.style.display = "block";
    startRecordBtn.disabled = true;
    stopRecordBtn.disabled  = false;
  }

  /* ── PUBLIC: pause ── */
  pause() {
    if(this.mediaRecorder?.state === "recording") {
      this.mediaRecorder.pause();
      clearInterval(this.timerInterval);
      this._stopRenderLoop();
      recordingIndicator.style.opacity = "0.4";
    }
  }

  /* ── PUBLIC: resume ── */
  resume() {
    if(this.mediaRecorder?.state === "paused") {
      this.mediaRecorder.resume();
      this.timerInterval = setInterval(() => {
        this.seconds++;
        this._updateTimerDisplay();
      }, 1000);
      this._startRenderLoop();
      recordingIndicator.style.opacity = "1";
    }
  }

  /* ── PUBLIC: stop ── */
  stop() {
    if(!this.mediaRecorder || this.mediaRecorder.state === "inactive") return;

    this.mediaRecorder.stop();
    this.cameraStream?.getTracks().forEach(t => t.stop());
    this.videoTrack = null; // stop pushing frames

    clearInterval(this.timerInterval);
    this._stopRenderLoop();

    // Hide DOM bubble
    this.bubbleEl.classList.remove("show");
    this.videoEl.srcObject = null;

    // Hide recording UI
    recordingIndicator.style.display  = "none";
    recordingIndicator.style.opacity  = "1";
    recordTimer.style.display         = "none";
    recordTimer.innerText             = "00:00";

    // Update buttons
    startRecordBtn.disabled = false;
    stopRecordBtn.disabled  = true;

    // Remove canvas drag listeners
    this.canvas.removeEventListener("pointerdown", this._onPointerDown, true);
    this.canvas.removeEventListener("pointermove", this._onPointerMove, true);
    this.canvas.removeEventListener("pointerup",   this._onPointerUp,   true);
  }

  /* ── PUBLIC: pushFrame — called at end of every redraw() ── */
  pushFrame() {
    if(this.videoTrack && this.mediaRecorder?.state === "recording") {
      try { this.videoTrack.requestFrame(); } catch(e) {}
    }
  }

  /* ── PUBLIC: drawBubble — called inside redraw() to paint camera onto canvas ── */
  drawBubble(ctx, canvas) {
    if(!this.videoTrack) return;                          // not recording
    if(!this.videoEl?.srcObject) return;                  // no camera
    if(this.videoEl.readyState < 2) return;               // video not ready

    const b  = this.bubble;
    if(b.x === null) {
      b.x = canvas.width  - b.size - b.pad;
      b.y = canvas.height - b.size - b.pad;
    }
    const r  = b.size / 2;
    const cx = b.x + r;
    const cy = b.y + r;

    ctx.save();

    // Drop shadow
    ctx.shadowColor    = "rgba(0,0,0,0.6)";
    ctx.shadowBlur     = 20;
    ctx.shadowOffsetY  = 4;

    // Circular clip
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.clip();

    // Draw mirrored video
    ctx.translate(cx, cy);
    ctx.scale(-1, 1);
    ctx.drawImage(this.videoEl, -r, -r, b.size, b.size);
    ctx.scale(-1, 1);
    ctx.translate(-cx, -cy);

    ctx.restore();

    // Pulsing red border
    const pulse = 0.3 + 0.15 * Math.sin(Date.now() / 280);
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle   = "#f87171";
    ctx.lineWidth     = 4;
    ctx.shadowColor   = `rgba(248,113,113,${pulse})`;
    ctx.shadowBlur    = 14;
    ctx.stroke();
    ctx.restore();

    // LIVE label
    ctx.save();
    ctx.font      = "bold 12px 'DM Sans', sans-serif";
    ctx.fillStyle = "rgba(248,113,113,0.95)";
    ctx.shadowColor = "rgba(0,0,0,0.7)";
    ctx.shadowBlur  = 4;
    ctx.fillText("● LIVE", cx - r + 9, cy - r + 19);
    ctx.restore();
  }

  /* ── PRIVATE: RAF render loop ── */
  _startRenderLoop() {
    if(this.rafId) return;
    const loop = () => {
      if(!this.rafId) return;
      redraw(); // redraw() calls pushFrame() and drawBubble() at its end
      this.rafId = requestAnimationFrame(loop);
    };
    this.rafId = requestAnimationFrame(loop);
  }

  _stopRenderLoop() {
    if(this.rafId) {
      cancelAnimationFrame(this.rafId);
      this.rafId = null;
    }
  }

  /* ── PRIVATE: save & download on stop ── */
  _onStop(mimeType) {
    const ext  = mimeType.includes("mp4") ? "mp4" : "webm";
    const blob = new Blob(this.chunks, { type: mimeType });
    const url  = URL.createObjectURL(blob);

    // Auto-download
    const a = document.createElement("a");
    a.href     = url;
    a.download = "recording_" + new Date().toISOString().slice(0,19).replace(/[:T]/g,"-") + "." + ext;
    a.click();

    // Save to history
    let history = JSON.parse(localStorage.getItem("recordingHistory") || "[]");
    history.push({ id: Date.now(), url, ext, date: new Date().toLocaleString() });
    localStorage.setItem("recordingHistory", JSON.stringify(history));
    loadRecordingHistory();
  }

  /* ── PRIVATE: timer display ── */
  _updateTimerDisplay() {
    const m = String(Math.floor(this.seconds / 60)).padStart(2, "0");
    const s = String(this.seconds % 60).padStart(2, "0");
    recordTimer.innerText = m + ":" + s;
  }

  /* ── PRIVATE: drag bubble on canvas ── */
  _bubblePointerDown(e) {
    const p = pos(e);
    const b = this.bubble;
    if(b.x === null) return;
    const r = b.size / 2, cx = b.x + r, cy = b.y + r;
    if(Math.hypot(p.x - cx, p.y - cy) <= r) {
      b.dragging = true;
      b.ox = p.x - b.x;
      b.oy = p.y - b.y;
      e.stopImmediatePropagation();
    }
  }

  _bubblePointerMove(e) {
    if(!this.bubble.dragging) return;
    const p = pos(e);
    const b = this.bubble;
    b.x = Math.max(0, Math.min(this.canvas.width  - b.size, p.x - b.ox));
    b.y = Math.max(0, Math.min(this.canvas.height - b.size, p.y - b.oy));
  }

  _bubblePointerUp() {
    this.bubble.dragging = false;
  }
}

/* ── Wire up buttons ── */
startRecordBtn.onclick  = () => {
  liveRecorder = new LiveRecorder(
    canvas,
    document.getElementById("bubbleVideo"),
    document.getElementById("cameraBubble")
  );
  liveRecorder.start();
};

pauseRecordBtn.onclick  = () => liveRecorder?.pause();
resumeRecordBtn.onclick = () => liveRecorder?.resume();
stopRecordBtn.onclick   = () => liveRecorder?.stop();
</script>

if(e.ctrlKey && e.key==="U"){
e.preventDefault();
panel.style.display="flex";
}

});

</script>
<script>
/* CAMERA BUBBLE — drag & close */
(function(){
  const bubble = document.getElementById("cameraBubble");
  const closeBtn = document.getElementById("closeBubble");

  let dragging = false, ox = 0, oy = 0;

  bubble.addEventListener("pointerdown", e=>{
    if(e.target === closeBtn) return;
    dragging = true;
    ox = e.clientX - bubble.getBoundingClientRect().left;
    oy = e.clientY - bubble.getBoundingClientRect().top;
    bubble.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  bubble.addEventListener("pointermove", e=>{
    if(!dragging) return;
    bubble.style.right = "auto";
    bubble.style.bottom = "auto";
    bubble.style.left = (e.clientX - ox) + "px";
    bubble.style.top  = (e.clientY - oy) + "px";
  });

  bubble.addEventListener("pointerup", ()=>{ dragging=false; });

  closeBtn.addEventListener("click", ()=>{
    bubble.classList.remove("show");
  });
})();
</script>
<script>
/* ══════════════════════════════════════════════════════════════
   LIVE ROOM — Google Apps Script + Sheets
   ──────────────────────────────────────────────────────────────
   ROLES:
     ADMIN  = User A — creates room, draws, approves viewers
     VIEWER = User B — joins via link, watches only (read-only)

   FLOW:
     1. A clicks Create → gets shareable link
     2. B opens link → sees "Waiting for approval" screen
     3. A sees approval popup → clicks Approve / Deny
     4. If approved: B enters viewer mode (board + A's video)
     5. Board strokes sync via polling every 1.5s
     6. Video is streamed peer-to-peer via WebRTC
══════════════════════════════════════════════════════════════ */

const GAS_LIVE_URL = "https://script.google.com/macros/s/AKfycbyUtG-zUNdDRoT_ZwItM-zkkPL34ipZ-m4bpMbtA-KLRksf0E4hIMW-gzJrpw_tT7Cs/exec";

/* ── State ── */
let MY_PEER_ID   = "u" + Math.random().toString(36).slice(2, 10);
let MY_ROLE      = null;   // "admin" | "viewer"
let currentRoom  = null;
let localStream  = null;   // admin camera stream
let peerConns    = {};     // peerId → RTCPeerConnection
let lastPollTs   = 0;
let pollInterval = null;
let pendingViewers = {};   // viewerId → name (waiting approval)

const ICE_CFG = { iceServers: [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" }
]};

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
function showRoomToast(msg, dur = 3500) {
  const t = document.getElementById("roomToast");
  t.textContent = msg;
  t.style.opacity = "1";
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.style.opacity = "0"; }, dur);
}

/* ════════════════════════════════════════════
   GAS TRANSPORT
════════════════════════════════════════════ */
async function gasWrite(type, extra = {}) {
  try {
    await fetch(GAS_LIVE_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "write", room: currentRoom,
        userId: MY_PEER_ID,
        data: { type, ...extra }
      })
    });
  } catch(e) { console.warn("gasWrite:", e); }
}

async function gasPoll() {
  const res  = await fetch(`${GAS_LIVE_URL}?room=${encodeURIComponent(currentRoom)}&since=${lastPollTs}`);
  const rows = await res.json();
  if (rows.length) lastPollTs = Math.max(...rows.map(r => r.ts));
  return rows.filter(r => r.userId !== MY_PEER_ID);
}

function makeDraggable(el) {

    el.style.left = (e.clientX - ox) + "px"; el.style.top = (e.clientY - oy) + "px";
  });
  el.addEventListener("pointerup", () => { dragging = false; el.style.cursor = "grab"; });
}

/* ════════════════════════════════════════════
   VIEWER CANVAS RENDERING
   — page-aware, stores strokes locally,
     draws shapes + strokes + correct bg
════════════════════════════════════════════ */

function updateViewerSyncStatus(msg) {
  const el = document.getElementById("viewerSyncStatus");
  if (el) el.textContent = msg;
}

function renderViewerPage(pageIdx) {
  const vc = document.getElementById("viewerCanvas");
  if (!vc) return;
  const vctx = vc.getContext("2d");
  const p = viewerPages[pageIdx];
  if (!p) return;

  // Clear + background
  vctx.clearRect(0, 0, vc.width, vc.height);
  vctx.fillStyle = p.bg || "#ffffff";
  vctx.fillRect(0, 0, vc.width, vc.height);

  // Draw shapes
  (p.shapes || []).forEach(s => {
    vctx.strokeStyle = s.color || "#000";
    vctx.fillStyle   = s.color || "#000";
    vctx.lineWidth   = 2;
    vctx.globalAlpha = 1;

    if (s.type === "rect")   { vctx.strokeRect(s.x, s.y, s.w, s.h); }
    else if (s.type === "circle") {
      vctx.beginPath();
      vctx.ellipse(s.x + s.w/2, s.y + s.h/2, Math.abs(s.w/2), Math.abs(s.h/2), 0, 0, Math.PI*2);
      vctx.stroke();
    }
    else if (s.type === "line") {
      vctx.beginPath(); vctx.moveTo(s.x, s.y); vctx.lineTo(s.x+s.w, s.y+s.h); vctx.stroke();
    }
    else if (s.type === "arrow") {
      const angle = Math.atan2(s.h, s.w), head = 15;
      vctx.beginPath(); vctx.moveTo(s.x, s.y); vctx.lineTo(s.x+s.w, s.y+s.h); vctx.stroke();
      vctx.beginPath();
      vctx.moveTo(s.x+s.w, s.y+s.h);
      vctx.lineTo(s.x+s.w - head*Math.cos(angle-Math.PI/6), s.y+s.h - head*Math.sin(angle-Math.PI/6));
      vctx.lineTo(s.x+s.w - head*Math.cos(angle+Math.PI/6), s.y+s.h - head*Math.sin(angle+Math.PI/6));
      vctx.closePath(); vctx.fill();
    }
  });

  // Draw all strokes for this page
  (p.strokes || []).forEach(s => drawViewerStroke(vctx, s));

  updateViewerSyncStatus("✅ Synced " + new Date().toLocaleTimeString());
}

// Draw a single stroke onto a ctx
function drawViewerStroke(vctx, s) {
  if (!s.points || s.points.length < 2) return;
  vctx.strokeStyle = s.color || "#000";
  vctx.lineWidth   = s.size  || 2;
  vctx.lineCap     = "round";
  vctx.lineJoin    = "round";
  vctx.globalAlpha = (s.type === "highlighter") ? (s.alpha || 0.3) : 1;
  vctx.beginPath();
  vctx.moveTo(s.points[0].x, s.points[0].y);
  for (let i = 1; i < s.points.length; i++) vctx.lineTo(s.points[i].x, s.points[i].y);
  vctx.stroke();
  vctx.globalAlpha = 1;
}

// Keep old name as alias so existing calls still work
function renderViewerBoard(pageData) {
  if (!pageData) return;
  // If called with a raw page object, put it in viewerPages[0] and render
  if (!viewerPages[0]) viewerPages[0] = pageData;
  else Object.assign(viewerPages[0], pageData);
  renderViewerPage(0);
}

// Append a new stroke to the viewer's local store AND draw it
function appendViewerStroke(stroke) {
  const pageIdx = stroke.page != null ? stroke.page : viewerCurrentPage;

  // Ensure viewerPages has enough slots
  while (viewerPages.length <= pageIdx) {
    viewerPages.push({ bg: "#ffffff", strokes: [], shapes: [] });
  }

  const strokeData = {
    color:  stroke.color  || "#000",
    size:   stroke.size   || 2,
    type:   stroke.type   || "pen",
    alpha:  stroke.alpha  || 1,
    points: stroke.points || []
  };

  // Store it
  viewerPages[pageIdx].strokes.push(strokeData);

  // Only draw immediately if we're on the right page
  if (pageIdx === viewerCurrentPage) {
    const vc = document.getElementById("viewerCanvas");
    if (vc) drawViewerStroke(vc.getContext("2d"), strokeData);
    updateViewerSyncStatus("✅ Synced " + new Date().toLocaleTimeString());
  }
}

/* ════════════════════════════════════════════
   BOARD SNAPSHOT (admin → viewer on approve)
   Strategy: compress strokes to minimal form,
   send as base64 to avoid GAS row size limits,
   split into 20KB chunks max.
════════════════════════════════════════════ */

// Viewer-side board store (mirrors admin's pages)
let viewerPages = [];   // [{bg, strokes, shapes}]
let viewerCurrentPage = 0;

async function sendBoardSnapshot(viewerId) {
  // Build compact snapshot of ALL pages
  const snapshot = {
    currentPage: current,
    pages: pages.map(p => ({
      bg:      p.bg      || "#ffffff",
      strokes: p.strokes || [],
      shapes:  p.shapes  || []
    }))
  };

  const payload = JSON.stringify(snapshot);

  // Encode as base64 to safely pass through GAS/Sheets
  const encoded = btoa(unescape(encodeURIComponent(payload)));

  // Split into 15KB chunks (safe GAS cell limit)
  const CHUNK = 15000;
  const total = Math.ceil(encoded.length / CHUNK);

  console.log(`Sending snapshot: ${payload.length} chars → ${total} chunks to ${viewerId}`);

  for (let i = 0; i < total; i++) {
    await gasWrite("board_snapshot_chunk", {
      to:    viewerId,
      chunk: i,
      total: total,
      sid:   MY_PEER_ID, // snapshot session id to avoid mix-ups
      data:  encoded.slice(i * CHUNK, (i + 1) * CHUNK)
    });
    // Small delay between chunks to avoid GAS rate limits
    if (total > 1) await new Promise(r => setTimeout(r, 300));
  }
}

// Buffer to reassemble incoming chunks on viewer side
let snapshotBuffer = {};

function handleSnapshotChunk(fromUserId, data) {
  const key = fromUserId + "_" + (data.sid || "snap");
  if (!snapshotBuffer[key]) {
    snapshotBuffer[key] = { chunks: {}, total: data.total };
  }
  snapshotBuffer[key].chunks[data.chunk] = data.data;

  const received = Object.keys(snapshotBuffer[key].chunks).length;
  console.log(`Snapshot chunk ${data.chunk + 1}/${data.total} received`);

  if (received >= snapshotBuffer[key].total) {
    // Reassemble in order
    const encoded = Array.from(
      { length: data.total },
      (_, i) => snapshotBuffer[key].chunks[i] || ""
    ).join("");
    delete snapshotBuffer[key];

    try {
      const payload = decodeURIComponent(escape(atob(encoded)));
      const snapshot = JSON.parse(payload);

      // Store full board in viewerPages
      viewerPages = snapshot.pages || [];
      viewerCurrentPage = snapshot.currentPage || 0;

      console.log(`Snapshot applied: ${viewerPages.length} pages, showing page ${viewerCurrentPage}`);

      // Render the current page
      renderViewerPage(viewerCurrentPage);
      updateViewerSyncStatus("✅ Board synced — " + viewerPages.length + " page(s)");
    } catch(e) {
      console.error("Snapshot parse error:", e);
      updateViewerSyncStatus("⚠️ Sync error — retrying...");
    }
  }
}

/* ════════════════════════════════════════════
   WEBRTC — Admin streams video to Viewer
════════════════════════════════════════════ */
async function createPeer(peerId, isInitiator) {
  if (peerConns[peerId]) return peerConns[peerId];
  const pc = new RTCPeerConnection(ICE_CFG);
  peerConns[peerId] = pc;

  // Admin adds camera tracks; viewer just receives
  if (MY_ROLE === "admin" && localStream) {
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  }

  pc.ontrack = e => {
    // Viewer receives admin's video
    if (MY_ROLE === "viewer") {
      const vid = document.getElementById("hostVideo");
      if (vid) { vid.srcObject = e.streams[0]; }
    }
  };

  pc.onicecandidate = e => {
    if (e.candidate) gasWrite("ice", { to: peerId, candidate: e.candidate });
  };

  pc.onconnectionstatechange = () => {
    if (["disconnected","failed","closed"].includes(pc.connectionState)) {
      if (MY_ROLE === "viewer") showRoomToast("📵 Host disconnected");
      delete peerConns[peerId];
    }
  };

  if (isInitiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    gasWrite("offer", { to: peerId, sdp: offer });
  }
  return pc;
}

/* ════════════════════════════════════════════
   POLL LOOP — handles all message types
════════════════════════════════════════════ */
async function pollLoop() {
  try {
    const msgs = await gasPoll();
    for (const { userId, data } of msgs) {

      /* ── Admin receives viewer join request ── */
      if (data.type === "viewer_request" && MY_ROLE === "admin") {
        if (!pendingViewers[userId]) {
          pendingViewers[userId] = data.viewerName || userId.slice(0,8);
          showApprovalPopup(userId, pendingViewers[userId]);
        }
      }

      /* ── Viewer receives approval ── */
      else if (data.type === "viewer_approved" && data.to === MY_PEER_ID && MY_ROLE === "viewer") {
        enterViewerMode();
        showRoomToast("✅ You've been approved! Welcome.");
        // Start WebRTC to receive admin video — viewer is NOT initiator
        await createPeer(userId, false);
      }

      /* ── Viewer receives denial ── */
      else if (data.type === "viewer_denied" && data.to === MY_PEER_ID) {
        hideViewerWaiting();
        currentRoom = null;
        clearInterval(pollInterval);
        pollInterval = null;
        showDeniedScreen();
      }

      /* ── WebRTC signaling ── */
      else if (data.type === "offer" && data.to === MY_PEER_ID) {
        const pc = await createPeer(userId, false);
        if (pc.signalingState === "stable") {
          await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          gasWrite("answer", { to: userId, sdp: answer });
        }
      }
      else if (data.type === "answer" && data.to === MY_PEER_ID) {
        const pc = peerConns[userId];
        if (pc && pc.signalingState === "have-local-offer")
          await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
      }
      else if (data.type === "ice" && data.to === MY_PEER_ID) {
        const pc = peerConns[userId];
        if (pc) try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e){}
      }

      /* ── Board snapshot chunks (viewer receives) ── */
      else if (data.type === "board_snapshot_chunk" && data.to === MY_PEER_ID) {
        handleSnapshotChunk(userId, data);
      }

      /* ── Incremental stroke (viewer receives) ── */
      else if (data.type === "stroke") {
        if (MY_ROLE === "viewer") {
          appendViewerStroke(data);
        } else {
          replayRemoteStroke(data); // fallback for old behaviour
        }
      }

      /* ── Board clear signal ── */
      else if (data.type === "board_clear" && MY_ROLE === "viewer") {
        const pageIdx = data.pageIdx != null ? data.pageIdx : viewerCurrentPage;
        if (viewerPages[pageIdx]) {
          viewerPages[pageIdx].strokes = [];
          viewerPages[pageIdx].shapes  = [];
          viewerPages[pageIdx].bg      = data.bg || "#ffffff";
        }
        if (pageIdx === viewerCurrentPage) renderViewerPage(viewerCurrentPage);
      }

      /* ── Page change signal ── */
      else if (data.type === "page_change" && MY_ROLE === "viewer") {
        viewerCurrentPage = data.pageIdx || 0;
        // If we have this page cached, render it immediately
        if (viewerPages[viewerCurrentPage]) {
          renderViewerPage(viewerCurrentPage);
        } else if (data.pageData) {
          // Admin sent page data along with the change
          viewerPages[viewerCurrentPage] = {
            bg:      data.pageData.bg      || "#ffffff",
            strokes: data.pageData.strokes || [],
            shapes:  data.pageData.shapes  || []
          };
          renderViewerPage(viewerCurrentPage);
        }
      }

      /* ── Host ending session ── */
      else if (data.type === "session_end" && MY_ROLE === "viewer") {
        showRoomToast("📵 Host ended the session");
        setTimeout(() => leaveSession(), 2000);
      }

      /* ── Viewer cancel ── */
      else if (data.type === "viewer_cancel" && MY_ROLE === "admin") {
        document.getElementById("approval-" + userId)?.remove();
        delete pendingViewers[userId];
        showRoomToast("ℹ️ A viewer cancelled their request");
      }
    }
  } catch(e) { console.warn("Poll error", e); }
}

/* ════════════════════════════════════════════
   DENIED SCREEN
════════════════════════════════════════════ */
function showDeniedScreen() {
  hideViewerWaiting();
  const ov = document.createElement("div");
  ov.id = "deniedOverlay";
  ov.style.cssText = `
    position:fixed;inset:0;background:rgba(15,17,23,0.97);z-index:999998;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    font-family:'DM Sans',sans-serif;color:#e8ecf4;
  `;
  ov.innerHTML = `
    <div style="font-size:48px;">🚫</div>
    <h2 style="font-size:20px;font-weight:600;margin:0;">Access Denied</h2>
    <p style="color:#8892a8;font-size:13px;margin:0;text-align:center;max-width:280px;">
      The host declined your request to join this session.
    </p>
    <button onclick="document.getElementById('deniedOverlay').remove()" style="
      margin-top:8px;padding:9px 24px;border-radius:6px;
      border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);
      color:#8892a8;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;">
      Close
    </button>
  `;
  document.body.appendChild(ov);
}

/* ════════════════════════════════════════════
   REPLAY STROKE (admin canvas — legacy support)
════════════════════════════════════════════ */
function replayRemoteStroke(data) {
  if (!data.points || data.points.length < 2) return;
  const pageIdx = data.page != null ? data.page : 0;
  if (!pages[pageIdx]) return;
  pages[pageIdx].strokes.push({
    color:  data.color  || "#000",
    size:   data.size   || 3,
    type:   data.type   || "pen",
    alpha:  data.alpha  || 1,
    points: data.points
  });
  if (pageIdx === current) redraw();
  saveToLocalStorage();
}

/* ════════════════════════════════════════════
   BROADCAST STROKE (admin → all viewers)
════════════════════════════════════════════ */
function broadcastStroke(stroke) {
  if (!currentRoom || MY_ROLE !== "admin" || !stroke || stroke.points.length < 2) return;
  gasWrite("stroke", {
    page:   current,
    color:  stroke.color,
    size:   stroke.size,
    type:   stroke.type  || "pen",
    alpha:  stroke.alpha || 1,
    points: stroke.points
  });
}

/* Also broadcast clear and page changes */
function broadcastClear(bg) {
  if (!currentRoom || MY_ROLE !== "admin") return;
  gasWrite("board_clear", { bg: bg || "#fff", pageIdx: current });
}

function broadcastPageChange(pageIdx) {
  if (!currentRoom || MY_ROLE !== "admin") return;
  const p = pages[pageIdx];
  if (!p) return;
  gasWrite("page_change", {
    pageIdx,
    pageData: { bg: p.bg, strokes: p.strokes, shapes: p.shapes || [] }
  });
}

/* ════════════════════════════════════════════
   CREATE ROOM (Admin = User A)
════════════════════════════════════════════ */
async function createRoom() {
  const roomId = Math.random().toString(36).slice(2, 8).toUpperCase();

  // Admin gets camera
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) {
    try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch(err) { showRoomToast("⚠️ No camera/mic found — continuing without media"); }
  }

  MY_ROLE     = "admin";
  currentRoom = roomId;
  lastPollTs  = Date.now() - 500;

  // Show admin's own video in header bubble area
  if (localStream) {
    const vid = document.getElementById("bubbleVideo");
    if (vid) { vid.srcObject = localStream; document.getElementById("cameraBubble").classList.add("show"); }
  }

  await gasWrite("room_created", {});
  pollInterval = setInterval(pollLoop, 1500);
  setRoomUI(true, roomId);
  showRoomToast("🎉 Room created — share the link!");

  // Show invite modal
  const link = buildInviteLink(roomId);
  document.getElementById("inviteRoomId").textContent = roomId;
  document.getElementById("inviteLink").textContent   = link;
  document.getElementById("roomInviteModal").classList.add("open");
}

/* ════════════════════════════════════════════
   JOIN ROOM AS VIEWER (User B from URL)
════════════════════════════════════════════ */
async function joinAsViewer(roomId) {
  roomId = roomId.trim().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 8);
  if (!roomId) return;

  MY_ROLE     = "viewer";
  currentRoom = roomId;
  lastPollTs  = Date.now() - 500;

  // Show waiting screen immediately
  showViewerWaiting(roomId);

  // Send join request to admin
  const viewerName = "Viewer-" + MY_PEER_ID.slice(1, 5).toUpperCase();
  await gasWrite("viewer_request", { viewerName });

  // Start polling for approval/denial
  pollInterval = setInterval(pollLoop, 1500);
}

/* ════════════════════════════════════════════
   LEAVE SESSION
════════════════════════════════════════════ */
function leaveSession() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

  if (MY_ROLE === "admin") {
    gasWrite("session_end", {});
    // Stop camera
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    document.getElementById("cameraBubble")?.classList.remove("show");
    setRoomUI(false);
    showRoomToast("👋 Session ended");
  } else {
    gasWrite("viewer_cancel", {});
    document.getElementById("viewerModeOverlay")?.remove();
    hideViewerWaiting();
    showRoomToast("👋 Left the session");
  }

  // Close all peer connections
  Object.entries(peerConns).forEach(([id, pc]) => { pc.close(); delete peerConns[id]; });

  currentRoom = null;
  MY_ROLE     = null;
}

/* ════════════════════════════════════════════
   UI HELPERS
════════════════════════════════════════════ */
function setRoomUI(inRoom, roomId = "") {
  document.getElementById("createRoomBtn").style.display  = inRoom ? "none" : "";
  document.getElementById("joinRoomBtn").style.display    = inRoom ? "none" : "";
  document.getElementById("leaveRoomBtn").style.display   = inRoom ? "" : "none";
  document.getElementById("copyInviteBtn").style.display  = inRoom ? "" : "none";
  document.getElementById("roomIdInput").disabled         = inRoom;
  document.getElementById("roomIdInput").value            = inRoom ? roomId : "";
  document.getElementById("roomStatus").textContent       = inRoom ? ("🟢 " + roomId) : "";
}

function buildInviteLink(roomId) {
  return location.origin + location.pathname + "?room=" + roomId;
}

function showRoomToast(msg, dur = 3500) {
  const t = document.getElementById("roomToast");
  if (!t) return;
  t.textContent = msg;
  t.style.opacity = "1";
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.style.opacity = "0"; }, dur);
}

/* ════════════════════════════════════════════
   BUTTON WIRING
════════════════════════════════════════════ */
document.getElementById("openLiveRoomBtn").addEventListener("click", () => {
  const bar = document.getElementById("liveRoomBar");
  bar.style.display = (bar.style.display === "flex") ? "none" : "flex";
});

document.getElementById("createRoomBtn").addEventListener("click", createRoom);

document.getElementById("joinRoomBtn").addEventListener("click", () => {
  const id = document.getElementById("roomIdInput").value;
  if (id.trim()) joinAsViewer(id);
  else showRoomToast("❌ Enter a room code first");
});

document.getElementById("roomIdInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const id = e.target.value;
    if (id.trim()) joinAsViewer(id);
  }
});

document.getElementById("leaveRoomBtn").addEventListener("click", leaveSession);

document.getElementById("copyInviteBtn").addEventListener("click", () => {
  if (!currentRoom) return;
  navigator.clipboard.writeText(buildInviteLink(currentRoom))
    .then(() => showRoomToast("📋 Invite link copied!"))
    .catch(() => showRoomToast("❌ Copy failed"));
});

document.getElementById("copyLinkBtn").addEventListener("click", () => {
  navigator.clipboard.writeText(document.getElementById("inviteLink").textContent)
    .then(() => showRoomToast("📋 Copied!")).catch(()=>{});
});

document.getElementById("closeInviteBtn").addEventListener("click", () => {
  document.getElementById("roomInviteModal").classList.remove("open");
});

/* ════════════════════════════════════════════
   AUTO-JOIN FROM URL  ?room=XXXXXX  (User B)
════════════════════════════════════════════ */
window.addEventListener("DOMContentLoaded", () => {
  const urlRoom = new URLSearchParams(location.search).get("room");
  if (urlRoom) {
    // Show the live room bar
    document.getElementById("liveRoomBar").style.display = "flex";
    document.getElementById("roomIdInput").value = urlRoom.toUpperCase();
    // Auto trigger viewer join after page loads
    setTimeout(() => joinAsViewer(urlRoom), 800);
  }
});

/* ════════════════════════════════════════════
   HOOK STROKE BROADCAST + CLEAR + PAGE CHANGE
════════════════════════════════════════════ */
window.addEventListener("load", () => {
  // Broadcast stroke on pointer up
  const origUp = canvas.onpointerup;
  canvas.onpointerup = function(e) {
    if (origUp) origUp.call(this, e);
    if (currentStroke && currentStroke.points && currentStroke.points.length > 1) {
      broadcastStroke(currentStroke);
    }
  };

  // Broadcast when admin clears canvas
  const clearBtn = document.getElementById("clearBtn");
  if (clearBtn) {
    const origClear = clearBtn.onclick;
    clearBtn.onclick = function(e) {
      if (origClear) origClear.call(this, e);
      broadcastClear(pages[current]?.bg);
    };
  }

  // Broadcast page changes — hook thumbnail clicks via MutationObserver on sidebar
  // and also hook addPage, deletePage, prevSlide, nextSlide
  const _broadcastCurrentPage = () => broadcastPageChange(current);

  const addPageBtn = document.getElementById("addPageBtn");
  if (addPageBtn) {
    const origAdd = addPageBtn.onclick;
    addPageBtn.onclick = function(e) {
      if (origAdd) origAdd.call(this, e);
      setTimeout(_broadcastCurrentPage, 50); // wait for page to be created
    };
  }

  const deletePageBtn = document.getElementById("deletePageBtn");
  if (deletePageBtn) {
    const origDel = deletePageBtn.onclick;
    deletePageBtn.onclick = function(e) {
      if (origDel) origDel.call(this, e);
      setTimeout(_broadcastCurrentPage, 50);
    };
  }

  // Hook sidebar thumbnail clicks via event delegation
  const sidebar = document.getElementById("sidebar");
  if (sidebar) {
    sidebar.addEventListener("click", () => {
      // Thumbnail click changes `current` — broadcast after a tick
      setTimeout(_broadcastCurrentPage, 50);
    });
  }

  // Hook slideshow prev/next
  const prevSlideBtn = document.getElementById("prevSlide");
  const nextSlideBtn = document.getElementById("nextSlide");
  if (prevSlideBtn) { prevSlideBtn.addEventListener("click", () => setTimeout(_broadcastCurrentPage, 50)); }
  if (nextSlideBtn) { nextSlideBtn.addEventListener("click", () => setTimeout(_broadcastCurrentPage, 50)); }
});
</script>
